openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Global App Admin Center API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: apps
    description: Monitored applications
  - name: subscriptions
    description: App store subscription financials
  - name: infrastructure
    description: Azure infrastructure metrics
  - name: network
    description: Network telemetry
  - name: cost
    description: Azure cost management
  - name: telemetry
    description: Application telemetry
  - name: alerts
    description: Alerts and incidents
  - name: ledger
    description: Per-app financial ledger
  - name: global
    description: Global cross-app views
  - name: users
    description: End-user activity (Clerk-sourced) for consumer apps
  - name: admin
    description: Administration — feature flags and platform configuration (requires Orbit-Admins)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }
  /apps:
    get:
      operationId: listApps
      tags: [apps]
      summary: List monitored applications
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AppSummary" }
  /apps/{appId}:
    get:
      operationId: getApp
      tags: [apps]
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppDetail" }
  /apps/{appId}/thresholds:
    get:
      operationId: getAppThresholds
      tags: [apps]
      summary: Get CPU and memory alert thresholds for an app (DB override → app default → global default)
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppThresholds" }
    put:
      operationId: updateAppThresholds
      tags: [apps]
      summary: Update CPU and memory alert thresholds. Requires Orbit-Admins or Orbit-Engineers.
      parameters:
        - $ref: "#/components/parameters/AppId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateAppThresholdsBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppThresholds" }
        "403":
          description: Forbidden — requires Orbit-Admins or Orbit-Engineers
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  requiredGroup: { type: string }
  /apps/{appId}/thresholds/log:
    get:
      operationId: listAppThresholdsLog
      tags: [apps]
      summary: Audit history of threshold changes for an app. Requires Orbit-Admins or Orbit-Engineers.
      parameters:
        - $ref: "#/components/parameters/AppId"
        - name: limit
          in: query
          description: Maximum number of entries to return (default 50).
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          description: Number of entries to skip for pagination (default 0).
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppThresholdsLogPage" }
        "403":
          description: Forbidden — requires Orbit-Admins or Orbit-Engineers
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  requiredGroup: { type: string }
        "404":
          description: App not found
  /apps/{appId}/infrastructure:
    get:
      operationId: getInfrastructure
      tags: [infrastructure]
      parameters:
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/Refresh"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InfrastructureReport" }
  /apps/{appId}/network:
    get:
      operationId: getNetwork
      tags: [network]
      parameters:
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/Refresh"
        - $ref: "#/components/parameters/RefreshEndpoints"
        - $ref: "#/components/parameters/RefreshThroughput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NetworkReport" }
  /apps/{appId}/cost:
    get:
      operationId: getCost
      tags: [cost]
      parameters:
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/Refresh"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CostReport" }
  /apps/{appId}/telemetry:
    get:
      operationId: getTelemetry
      tags: [telemetry]
      parameters:
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/Refresh"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TelemetryReport" }
  /apps/{appId}/alerts:
    get:
      operationId: getAppAlerts
      tags: [alerts]
      parameters:
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/Refresh"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Alert" }
  /apps/{appId}/ledger:
    get:
      operationId: getLedger
      tags: [ledger]
      summary: Financial ledger (balances, reconciliation, recent transactions) for an app
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LedgerReport" }
  /apps/{appId}/ledger/entries:
    get:
      operationId: listLedgerEntries
      tags: [ledger]
      summary: List journal entries for an app, newest first
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LedgerJournalEntry" }
    post:
      operationId: postLedgerEntry
      tags: [ledger]
      summary: Post a new balanced double-entry journal entry
      parameters:
        - $ref: "#/components/parameters/AppId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostLedgerEntryRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LedgerJournalEntry" }
        "400":
          description: Invalid entry (unbalanced, unknown account, or bad amount)
        "404":
          description: App not found
  /apps/{appId}/ledger/sales:
    post:
      operationId: ingestLedgerSale
      tags: [ledger]
      summary: Ingest a platform sale, netting out the platform fee into the ledger
      description: >-
        Records a sale as a balanced pair of journal entries: gross revenue
        recognized and the platform fee (Apple 30%, Google 15%, Stripe 3%) booked
        as an expense, leaving net cash correct. Idempotent on (source, externalRef).
      parameters:
        - $ref: "#/components/parameters/AppId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IngestSaleRequest" }
      responses:
        "201":
          description: Sale recorded (or already recorded — idempotent)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IngestSaleResult" }
        "400":
          description: Invalid sale (bad amount, unknown source, or missing accounts)
        "404":
          description: App not found
  /apps/{appId}/ledger/stripe/sync:
    post:
      operationId: syncStripeSales
      tags: [ledger]
      summary: Import live Stripe charges into the app's ledger with their actual fees
      description: >-
        Pulls succeeded Stripe charges and records each as a balanced sale,
        booking Stripe's actual reported per-transaction fee as the platform-fee
        expense. Idempotent on the Stripe charge id, so re-running is safe.
        Enabled for GrailBabe only.
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: Sync completed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StripeSyncResult" }
        "400":
          description: Stripe sync is not enabled for this app
        "404":
          description: App not found
        "503":
          description: Stripe is not connected
  /apps/{appId}/ledger/app-store/sync:
    post:
      operationId: syncAppStoreSales
      tags: [ledger]
      summary: Import Apple App Store subscription events into the app's ledger
      description: >-
        Fetches the App Store Connect SUBSCRIPTION_EVENT monthly report and records
        each renewal and new subscription as a balanced sale in the ledger, booking
        the actual Apple fee (customer price minus developer proceeds). Idempotent
        on the (subscriber-id, event-date, subscription-apple-id) triple. Requires
        APPLE_VENDOR_NUMBER in addition to the existing Apple API credentials.
      parameters:
        - $ref: "#/components/parameters/AppId"
        - name: month
          in: query
          required: false
          schema:
            type: string
            pattern: "^[0-9]{4}-(0[1-9]|1[0-2])$"
          description: Month in YYYY-MM format. Defaults to the previous calendar month.
      responses:
        "200":
          description: Sync completed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StoreSyncResult" }
        "400":
          description: Bad request (invalid month or ledger chart of accounts not set up)
        "404":
          description: App not found
        "503":
          description: Apple App Store report credentials not configured (APPLE_VENDOR_NUMBER missing)
  /apps/{appId}/ledger/play-store/sync:
    post:
      operationId: syncPlayStoreSales
      tags: [ledger]
      summary: Import Google Play earnings report into the app's ledger
      description: >-
        Fetches the Google Play earnings CSV from the configured GCS bucket and
        records each successful charge as a balanced sale in the ledger, booking
        the 15% Play fee reconstructed from the net merchant proceeds. Idempotent
        on the Google Play order number. Requires WIF credentials plus
        GOOGLE_PLAY_REPORTING_BUCKET.
      parameters:
        - $ref: "#/components/parameters/AppId"
        - name: month
          in: query
          required: false
          schema:
            type: string
            pattern: "^[0-9]{4}-(0[1-9]|1[0-2])$"
          description: Month in YYYY-MM format. Defaults to the previous calendar month.
      responses:
        "200":
          description: Sync completed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StoreSyncResult" }
        "400":
          description: Bad request (invalid month or ledger chart of accounts not set up)
        "404":
          description: App not found
        "503":
          description: Google Play report credentials not configured (GOOGLE_PLAY_REPORTING_BUCKET or WIF vars missing)
  /apps/{appId}/ledger/reconcile:
    post:
      operationId: reconcileLedger
      tags: [ledger]
      summary: Run reconciliation for an app's ledger and persist the result
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LedgerReconciliation" }
        "404":
          description: App not found
  /global/health:
    get:
      operationId: getGlobalHealth
      tags: [global]
      summary: Global health overview across all apps
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlobalHealth" }
  /global/alerts:
    get:
      operationId: listGlobalAlerts
      tags: [global, alerts]
      summary: All alerts across all apps (any status)
      parameters:
        - $ref: "#/components/parameters/Refresh"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Alert" }
  /users/clerk-events:
    get:
      operationId: listClerkEventSummary
      tags: [users]
      summary: Per-app Clerk user lifecycle event breakdown (signups, updates, deletions) for the last 30 days
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ClerkEventSummaryRow" }
  /users/staff-stats:
    get:
      operationId: getStaffStats
      tags: [users]
      summary: Entra ID RBAC group member counts for Orbit groups (Authorized-Users, Cost-Readers, etc.)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StaffStatsResponse" }
  /users/activity:
    get:
      operationId: listUserActivity
      tags: [users]
      summary: Per-app end-user activity (Clerk-sourced aggregate counts)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UserActivityRow" }
  /users/identities:
    get:
      operationId: listClerkIdentities
      tags: [users]
      summary: Individual Clerk user records for a given app (email + account age), most recently joined first
      parameters:
        - name: appId
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ClerkIdentityRow" }
  /play/subscriptions:
    get:
      operationId: listPlaySubscriptions
      tags: [subscriptions]
      summary: Per-app Google Play subscription states + revenue (placeholder until the app is live)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PlaySubscriptionRow" }
  /apple/subscriptions:
    get:
      operationId: listAppleSubscriptions
      tags: [subscriptions]
      summary: Per-app Apple App Store subscription states + revenue (placeholder until credentials are provisioned)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AppleSubscriptionRow" }
  /stripe/subscriptions:
    get:
      operationId: listStripeSubscriptions
      tags: [subscriptions]
      summary: Per-app Stripe subscription states + revenue (placeholder until STRIPE_SECRET_KEY is configured)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StripeSubscriptionRow" }
        "404":
          description: Surface disabled via feature flag
  /apps/{appId}/deployments:
    get:
      operationId: listDeployments
      tags: [apps]
      summary: GitHub Actions workflow runs for this app (last 50 runs). Returns empty deployments array when GITHUB_TOKEN is absent.
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListDeploymentsResponse" }
  /apps/{appId}/activity:
    get:
      operationId: listActivityLog
      tags: [apps]
      summary: Azure Activity Log events for this app's resource group (last 7 days). Returns [] when Azure is unconfigured.
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActivityEntry" }
  /apps/{appId}/logs:
    get:
      operationId: queryLogs
      tags: [apps]
      summary: KQL query against the centralised Log Analytics workspace. Returns [] when AZURE_LOG_ANALYTICS_WORKSPACE_ID is absent.
      parameters:
        - $ref: "#/components/parameters/AppId"
        - name: q
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LogLine" }
  /global/tag-compliance:
    get:
      operationId: getTagCompliance
      tags: [global]
      summary: Tag compliance scan across all monitored subscriptions, resource groups, and resources.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TagComplianceResponse" }
  /global/service-health:
    get:
      operationId: listServiceHealth
      tags: [global]
      summary: Azure Service Health events for all monitored subscriptions.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServiceHealthResponse" }
  /global/slos:
    get:
      operationId: listSlos
      tags: [global]
      summary: Per-application SLO snapshot derived from Azure Monitor. Returns mock rows when Azure is unconfigured.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlosResponse"
  /global/endpoints:
    get:
      operationId: listGlobalEndpoints
      tags: [global]
      summary: Cross-application network endpoint health from Azure. Returns empty endpoints when Azure is unconfigured.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlobalEndpointsResponse" }
  /cost/anomaly-dismissals:
    get:
      operationId: listAnomalyDismissals
      tags: [cost]
      summary: List dismissed anomaly date-keys for this session plus any team-wide (global) dismissals
      parameters:
        - name: appId
          in: query
          required: true
          description: The app whose dismissals to return.
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnomalyDismissalsResponse" }
    post:
      operationId: dismissAnomaly
      tags: [cost]
      summary: Mark a cost anomaly as dismissed (session-only or team-wide)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DismissAnomalyRequest" }
      responses:
        "204":
          description: Dismissed
    delete:
      operationId: undismissAnomaly
      tags: [cost]
      summary: Remove a global (team-wide) anomaly dismissal so the banner shows again for everyone
      parameters:
        - name: appId
          in: query
          required: true
          description: The app whose global dismissal to remove.
          schema: { type: string }
        - name: dateKey
          in: query
          required: true
          description: ISO date (YYYY-MM-DD) of the anomaly to un-dismiss.
          schema: { type: string }
      responses:
        "204":
          description: Un-dismissed
  /global/cost-summary:
    get:
      operationId: getGlobalCostSummary
      tags: [global, cost]
      summary: Cross-application cost summary — total MTD spend and per-app breakdown with WoW trend.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GetGlobalCostSummaryResponse" }
  /budget-alerts/log:
    get:
      operationId: listBudgetAlertLog
      tags: [alerts, cost]
      summary: Recent budget-overrun notifications that were dispatched by the scheduler
      parameters:
        - name: appId
          in: query
          required: false
          description: Filter to a specific app. Omit to return entries for all apps.
          schema: { type: string }
        - name: limit
          in: query
          required: false
          description: Maximum number of entries to return (default 50, max 200).
          schema: { type: integer }
        - name: offset
          in: query
          required: false
          description: Number of entries to skip for pagination (default 0).
          schema: { type: integer, minimum: 0, default: 0 }
        - name: unacknowledgedOnly
          in: query
          required: false
          description: When true, only return entries that have not yet been acknowledged.
          schema: { type: boolean }
        - name: since
          in: query
          required: false
          description: ISO 8601 datetime. When set, only return entries with sentAt >= since.
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BudgetAlertLogPage" }
  /budget-alerts/log/{id}/acknowledge:
    patch:
      operationId: acknowledgeBudgetAlertLogEntry
      tags: [alerts, cost]
      summary: Acknowledge (dismiss) a budget-overrun alert log entry
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AcknowledgeBudgetAlertBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BudgetAlertLogEntry" }
        "404":
          description: Entry not found
  /alerts/channels:
    get:
      operationId: getAlertChannelStatus
      tags: [alerts]
      summary: Which notification channels (Teams, Email) are currently configured and ready to fire
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertChannelStatus" }
  /alerts/config:
    get:
      operationId: listAlertConfig
      tags: [alerts]
      summary: Effective CPU / memory / consecutive-checks thresholds per app, including override source
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AppAlertConfig" }
  /alerts/config/{appId}:
    put:
      operationId: updateAlertConfig
      tags: [alerts]
      summary: Save per-app infra alert threshold overrides (requires Orbit-Admins membership)
      parameters:
        - $ref: "#/components/parameters/AppId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateAlertConfigBody" }
      responses:
        "200":
          description: Updated configuration
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppAlertConfig" }
        "400":
          description: Validation error
        "403":
          description: Caller is not a member of Orbit-Admins
  /alerts/config/{appId}/history:
    get:
      operationId: getAlertConfigHistory
      tags: [alerts]
      summary: Audit log of all threshold changes for a specific app, newest first (max 200, newest first)
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AlertThresholdConfigLogEntry" }
        "404":
          description: App not found
  /infra-alerts/log:
    get:
      operationId: listInfraAlertLog
      tags: [alerts]
      summary: Recent infra-pressure notifications (CPU / memory threshold breaches) dispatched by the scheduler
      parameters:
        - name: appId
          in: query
          required: false
          description: Filter to a specific app. Omit to return entries for all apps.
          schema: { type: string }
        - name: limit
          in: query
          required: false
          description: Maximum number of entries to return (default 50, max 200).
          schema: { type: integer }
        - name: offset
          in: query
          required: false
          description: Number of entries to skip for pagination (default 0).
          schema: { type: integer, minimum: 0, default: 0 }
        - name: unacknowledgedOnly
          in: query
          required: false
          description: When true, only return entries that have not yet been acknowledged.
          schema: { type: boolean }
        - name: since
          in: query
          required: false
          description: ISO 8601 datetime. When set, only return entries with sentAt >= since.
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InfraAlertLogPage" }
  /admin/feature-flags:
    get:
      operationId: listFeatureFlags
      tags: [admin]
      summary: List all known feature flags with their current enabled/disabled state. Requires Orbit-Admins.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FeatureFlag" }
        "403":
          description: Forbidden — requires Orbit-Admins
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  requiredGroup: { type: string }
  /admin/feature-flags/{flagName}:
    put:
      operationId: setFeatureFlag
      tags: [admin]
      summary: Enable or disable a feature flag. Requires Orbit-Admins.
      parameters:
        - name: flagName
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetFeatureFlagBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeatureFlag" }
        "403":
          description: Forbidden — requires Orbit-Admins
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  requiredGroup: { type: string }
        "404":
          description: Flag not found (unknown flag name)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
  /infra-alerts/log/{id}/acknowledge:
    patch:
      operationId: acknowledgeInfraAlertLogEntry
      tags: [alerts]
      summary: Acknowledge (dismiss) an infra-pressure alert log entry
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InfraAlertLogEntry" }
        "404":
          description: Entry not found
components:
  parameters:
    AppId:
      name: appId
      in: path
      required: true
      schema: { type: string }
    Refresh:
      name: refresh
      in: query
      required: false
      description: When true, bypasses the in-process server-side cache and fetches fresh data from Azure.
      schema: { type: boolean }
    RefreshEndpoints:
      name: refreshEndpoints
      in: query
      required: false
      description: When true, bypasses the endpoint-probe cache only (network tab). Independent of refreshThroughput.
      schema: { type: boolean }
    RefreshThroughput:
      name: refreshThroughput
      in: query
      required: false
      description: When true, bypasses the throughput time-series cache only (network tab). Independent of refreshEndpoints.
      schema: { type: boolean }
  schemas:
    FeatureFlag:
      type: object
      required: [name, label, description, enabled, configStore]
      properties:
        name:
          type: string
          description: Stable identifier used in App Configuration (e.g. "play-subscriptions")
        label:
          type: string
          description: Human-readable display name
        description:
          type: string
          description: What surface this flag controls
        enabled:
          type: boolean
          description: Current effective state of the flag
        configStore:
          type: string
          enum: [live, mock]
          description: "live = read from App Configuration store; mock = APP_CONFIGURATION_ENDPOINT not set (always enabled)"
    SetFeatureFlagBody:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: Desired state for the flag
    AnomalyDismissalsResponse:
      type: object
      required: [dismissedDateKeys, globalDismissals]
      properties:
        dismissedDateKeys:
          type: array
          items: { type: string }
          description: ISO date keys (YYYY-MM-DD) dismissed in the current session or globally for this app
        globalDismissals:
          type: array
          items: { $ref: "#/components/schemas/GlobalAnomalyDismissal" }
          description: Team-wide dismissals (scope=global) with the operator who dismissed them
    GlobalAnomalyDismissal:
      type: object
      required: [dateKey]
      properties:
        dateKey:
          type: string
          description: ISO date (YYYY-MM-DD) of the anomalous day
        dismissedBy:
          type: string
          nullable: true
          description: Display name or UPN of the operator who dismissed it for the team
    DismissAnomalyRequest:
      type: object
      required: [appId, dateKey]
      properties:
        appId:
          type: string
          description: ID of the app whose anomaly is being dismissed
        dateKey:
          type: string
          description: ISO date (YYYY-MM-DD) of the anomalous day to dismiss
        scope:
          type: string
          enum: [session, global]
          default: session
          description: "session = only this browser session; global = dismissed for everyone on the team"
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }
    Status:
      type: string
      enum: [healthy, degraded, unhealthy, unknown]
    Severity:
      type: string
      enum: [info, warning, error, critical]
    UserAuthType:
      type: string
      enum: [clerk, entra, none]
      description: >-
        Identity system that authenticates this app's end users.
        "clerk" = consumer app with Clerk-authenticated users (activity ingested via webhooks).
        "entra" = employee-only internal tool authenticated via Entra ID.
        "none" = no end-user authentication (e.g. public marketing site).
    AppTags:
      type: object
      description: >-
        Azure resource tags applied to this application's resource group.
        The five standard Kinisis tag keys are typed explicitly; any additional
        tags on the resource group are preserved as free-form string values.
      properties:
        workload:
          type: string
          description: Workload identifier matching the Azure workload tag (e.g. "GrailBabeProd").
        environment:
          type: string
          description: Deployment environment tag value (e.g. "prod", "staging", "dev").
        owner:
          type: string
          description: Team or individual responsible for this workload.
        cost-center:
          type: string
          description: FinOps cost-center code (e.g. "CC-GrailBabeProd").
        criticality:
          type: string
          description: "Business criticality classification (e.g. mission-critical, high, medium, low)."
    AppSummary:
      type: object
      required: [id, name, environment, region, status, resourceGroup, subscriptionId, tags, activeAlerts, monthToDateCost, userAuth]
      properties:
        id: { type: string }
        name: { type: string }
        environment: { type: string, enum: [prod, staging, dev] }
        region: { type: string }
        resourceGroup: { type: string }
        subscriptionId: { type: string }
        subscriptionName: { type: string, description: "Human-readable Azure subscription display name. Only present when Azure is configured." }
        tags:
          $ref: "#/components/schemas/AppTags"
        status: { $ref: "#/components/schemas/Status" }
        activeAlerts: { type: integer }
        monthToDateCost: { type: number }
        costDataSource: { type: string, enum: [live, cached, mock], description: "Indicates whether the monthToDateCost figure comes from live Azure Cost Management, a DB snapshot (cached), or built-in mock values." }
        budget: { type: number, description: "Monthly budget cap in USD from Azure Cost Management. Only present when a budget is configured in Azure." }
        forecast: { type: number, description: "Projected end-of-month spend in USD from Azure Cost Management Forecast API. Only present when Azure is configured." }
        forecastOverBudget: { type: boolean, description: "True when the projected end-of-month spend exceeds the monthly budget cap." }
        group: { type: string, description: Optional scope-selector grouping label (e.g. Platform). }
        androidPackage:
          type: string
          description: >-
            Google Play package name when this app ships a tracked Android build.
            Presence signals a Play Store link is available.
        iosBundle:
          type: string
          description: >-
            Apple App Store bundle identifier when this app ships a tracked iOS build.
            Presence signals an App Store link is available.
        userAuth:
          $ref: "#/components/schemas/UserAuthType"
    AppDetail:
      allOf:
        - $ref: "#/components/schemas/AppSummary"
        - type: object
          required: [owners, userAuth]
          properties:
            description: { type: string }
            owners:
              type: array
              items: { type: string }
            userAuth:
              $ref: "#/components/schemas/UserAuthType"
            androidPackage:
              type: string
              description: >-
                Google Play package name when this app ships a tracked Android build.
                Presence flags the app for the Play subscriptions surface.
            playAppId:
              type: string
              description: >-
                Numeric Google Play app ID. When present, used to construct a direct link
                to the app's management page in Google Play Console.
            iosBundle:
              type: string
              description: >-
                Apple App Store bundle identifier when this app ships a tracked iOS build.
                Presence flags the app for the App Store subscriptions surface.
            appleAppId:
              type: string
              description: >-
                Numeric Apple App ID as shown in App Store Connect (e.g. "6741234567").
                Used to construct direct links into the App Store Connect management console.
            appRepo:
              type: string
              description: >-
                GitHub repository name (under the Kinisis-Labs org) used to fetch
                deployment history from GitHub Actions. Absent for apps without a
                tracked CI/CD pipeline.
            cpuThreshold:
              type: number
              description: >-
                CPU utilisation percentage at which the SLO badge turns warning/critical.
                Overrides the global default (80%) for this app. Optional.
            memoryThreshold:
              type: number
              description: >-
                Memory utilisation percentage at which the SLO badge turns warning/critical.
                Overrides the global default (85%) for this app. Optional.
            budgetName:
              type: string
              description: >-
                Named Azure Cost Management budget for this app (e.g. "bgt-grailbabe-prod").
                When set, the budget is fetched directly by name rather than by scanning the
                subscription. Scope is resolved from APP_BILLING_SCOPE (subscription or RG).
    ClerkEventSummaryDay:
      type: object
      required: [day, signups, updates, deletions]
      properties:
        day: { type: string, format: date, description: "YYYY-MM-DD" }
        signups: { type: integer }
        updates: { type: integer }
        deletions: { type: integer }
    ClerkEventSummaryRow:
      type: object
      required: [appId, signups7d, signups30d, updates7d, updates30d, deletions7d, deletions30d, daily]
      properties:
        appId: { type: string }
        signups7d: { type: integer }
        signups30d: { type: integer }
        updates7d: { type: integer }
        updates30d: { type: integer }
        deletions7d: { type: integer }
        deletions30d: { type: integer }
        daily:
          type: array
          items: { $ref: "#/components/schemas/ClerkEventSummaryDay" }
    StaffGroupRow:
      type: object
      required: [id, name, memberCount]
      properties:
        id: { type: string, description: "Entra group object ID (GUID)" }
        name: { type: string, description: "Group display name" }
        memberCount: { type: integer, description: "Current direct member count" }
    StaffStatsResponse:
      type: object
      required: [groups, dataSource]
      properties:
        groups:
          type: array
          items: { $ref: "#/components/schemas/StaffGroupRow" }
        dataSource:
          type: string
          enum: [live, unconfigured]
          description: "'live' when Entra client creds are configured; 'unconfigured' otherwise."
    UserActivityRow:
      type: object
      required: [appId, appName, environment, totalMembers, dau, wau, mau, inactive30d, newLast7d, dauTrendPct, dataSource]
      properties:
        appId: { type: string }
        appName: { type: string }
        environment: { type: string }
        totalMembers: { type: integer }
        dau: { type: integer }
        wau: { type: integer }
        mau: { type: integer }
        inactive30d: { type: integer }
        newLast7d: { type: integer }
        dauTrendPct: { type: number }
        dataSource: { type: string, enum: [live, demo], description: "live = real Clerk webhook events exist in DB; demo = seeded/placeholder data only" }
    ClerkIdentityRow:
      type: object
      required: [clerkUserId, createdAt, deleted]
      properties:
        clerkUserId: { type: string }
        email: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        lastSignInAt: { type: string, format: date-time, nullable: true }
        lastActiveAt: { type: string, format: date-time, nullable: true }
        deleted: { type: boolean }
    PlaySubscriptionRow:
      type: object
      required: [appId, appName, environment, packageName, activeSubscribers, canceledSubscribers, expiredSubscribers, mrr, revenueLast30d, currency, activeTrendPct, dataSource]
      properties:
        appId: { type: string }
        appName: { type: string }
        environment: { type: string }
        packageName: { type: string }
        playAppId:
          type: string
          description: >-
            Numeric Google Play app ID. When present, used together with playDeveloperId
            to construct a direct link to the app in Google Play Console.
        playDeveloperId:
          type: string
          description: >-
            Google Play developer account ID. When present alongside playAppId, enables
            construction of a direct link into Google Play Console.
        activeSubscribers: { type: integer, description: Currently active/paying subscribers }
        canceledSubscribers: { type: integer, description: Auto-renew turned off but still within the paid term }
        expiredSubscribers: { type: integer, description: Lapsed/churned subscribers (inactive) }
        mrr: { type: number, description: Monthly recurring revenue in the reported currency }
        revenueLast30d: { type: number, description: Subscription revenue over the trailing 30 days }
        currency: { type: string }
        activeTrendPct: { type: number, description: Active-subscriber change vs the prior period }
        dataSource: { type: string, enum: [placeholder, live, cached] }
        dataAsOf: { type: string, format: date-time, description: "Timestamp of when subscription data was last fetched from Google Play. Only present when dataSource is live or cached." }
    StripeSubscriptionRow:
      type: object
      required: [appId, appName, environment, activeSubscribers, trialingSubscribers, canceledSubscribers, pastDueSubscribers, mrr, revenueLast30d, currency, activeTrendPct, dataSource]
      properties:
        appId: { type: string }
        appName: { type: string }
        environment: { type: string }
        activeSubscribers: { type: integer, description: Currently active (non-trialing) subscriptions }
        trialingSubscribers: { type: integer, description: Subscriptions currently in a free trial }
        canceledSubscribers: { type: integer, description: Canceled subscriptions }
        pastDueSubscribers: { type: integer, description: Subscriptions with a failed payment }
        mrr: { type: number, description: Monthly recurring revenue from active subscriptions }
        revenueLast30d: { type: number, description: Revenue from paid invoices over the trailing 30 days }
        currency: { type: string }
        activeTrendPct: { type: number, description: Active-subscriber change vs the prior period }
        dataSource: { type: string, enum: [placeholder, live, cached] }
        dataAsOf: { type: string, format: date-time, description: "Timestamp of when subscription data was last fetched from Stripe. Only present when dataSource is live." }
        stripeDashboardUrl: { type: string, description: Direct link to Stripe Dashboard subscriptions page }
    AppleSubscriptionRow:
      type: object
      required: [appId, appName, environment, bundleId, activeSubscribers, canceledSubscribers, expiredSubscribers, mrr, revenueLast30d, currency, activeTrendPct, dataSource]
      properties:
        appId: { type: string }
        appName: { type: string }
        environment: { type: string }
        bundleId: { type: string }
        appleAppId:
          type: string
          description: >-
            Numeric Apple App ID. When present, used to construct a direct link to the
            app's management page in App Store Connect.
        activeSubscribers: { type: integer, description: Currently active/paying subscribers }
        canceledSubscribers: { type: integer, description: Auto-renew turned off but still within the paid term }
        expiredSubscribers: { type: integer, description: Lapsed/churned subscribers (inactive) }
        mrr: { type: number, description: Monthly recurring revenue in the reported currency }
        revenueLast30d: { type: number, description: Subscription revenue over the trailing 30 days }
        currency: { type: string }
        activeTrendPct: { type: number, description: Active-subscriber change vs the prior period }
        dataSource: { type: string, enum: [placeholder, live, cached] }
        dataAsOf: { type: string, format: date-time, description: "Timestamp of when subscription data was last fetched from Apple App Store Connect. Only present when dataSource is live or cached." }
    MetricPoint:
      type: object
      required: [timestamp, value]
      properties:
        timestamp: { type: string, format: date-time }
        value: { type: number }
    DailyCostPoint:
      type: object
      required: [timestamp, value]
      properties:
        timestamp: { type: string, format: date-time }
        value: { type: number }
        vsLastWeek: { type: number, nullable: true, description: "Percentage change vs the same day 7 days ago. Positive = higher spend, negative = lower. Omitted when comparison data is unavailable (first 7 days of the series)." }
    MetricSeries:
      type: object
      required: [name, unit, points]
      properties:
        name: { type: string }
        unit: { type: string }
        points:
          type: array
          items: { $ref: "#/components/schemas/MetricPoint" }
    InfrastructureResource:
      type: object
      required: [id, name, type, status, location]
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        status: { $ref: "#/components/schemas/Status" }
        location: { type: string }
        cpuPercent: { type: number }
        memoryPercent: { type: number }
    InfrastructureReport:
      type: object
      required: [resources, series, dataSource]
      properties:
        resources:
          type: array
          items: { $ref: "#/components/schemas/InfrastructureResource" }
        series:
          type: array
          items: { $ref: "#/components/schemas/MetricSeries" }
        dataSource: { type: string, enum: [live, mock], description: "Indicates whether resource data comes from live Azure Resource Graph or built-in mock values." }
        cachedAt: { type: string, format: date-time, description: "Timestamp of when infrastructure data was last fetched from Azure. Only present when dataSource is live." }
    NetworkEndpoint:
      type: object
      required: [name, status, latencyMs, region]
      properties:
        name: { type: string }
        status: { $ref: "#/components/schemas/Status" }
        latencyMs: { type: number }
        packetLossPercent: { type: number }
        region: { type: string }
    NetworkReport:
      type: object
      required: [endpoints, throughput, dataSource]
      properties:
        endpoints:
          type: array
          items: { $ref: "#/components/schemas/NetworkEndpoint" }
        throughput:
          type: array
          items: { $ref: "#/components/schemas/MetricSeries" }
        dataSource:
          type: string
          enum: [live, mock]
          description: "Whether throughput data came from a real Azure source or is seeded mock data."
        endpointsDataSource:
          type: string
          enum: [live, mock]
          description: "Whether endpoint data came from a real Azure source or is seeded mock data."
    CostByService:
      type: object
      required: [service, amount]
      properties:
        service: { type: string }
        amount: { type: number }
        trend: { type: string, nullable: true, description: "Week-over-week percentage change (e.g. '+8.2%' or '-3.1%'). Omitted when insufficient data." }
    ApiByName:
      type: object
      required: [name, totalCalls, cost]
      properties:
        name: { type: string, description: Logical API operation or endpoint name }
        totalCalls: { type: integer }
        cost: { type: number }
    ApiUsage:
      type: object
      required: [totalCalls, costPerMillion, cost, byApi]
      description: API consumption (API Management + gateway egress) included in monthToDate.
      properties:
        totalCalls: { type: integer, description: Month-to-date API call count }
        costPerMillion: { type: number, description: Blended unit price per million calls }
        cost: { type: number, description: Month-to-date API usage cost }
        byApi:
          type: array
          description: Cost breakdown by individual API name (operation / endpoint).
          items: { $ref: "#/components/schemas/ApiByName" }
    CostReport:
      type: object
      required: [currency, monthToDate, forecast, budget, daily, byService, apiUsage, revenue, dataSource]
      properties:
        currency: { type: string }
        monthToDate: { type: number }
        forecast: { type: number }
        budget: { type: number }
        daily:
          type: array
          items: { $ref: "#/components/schemas/DailyCostPoint" }
        byService:
          type: array
          items: { $ref: "#/components/schemas/CostByService" }
        apiUsage: { $ref: "#/components/schemas/ApiUsage" }
        revenue: { $ref: "#/components/schemas/Revenue" }
        dataSource: { type: string, enum: [live, cached, mock], description: "Indicates whether cost figures come from live Azure Cost Management, a DB snapshot (cached), or built-in mock values." }
        dataAsOf: { type: string, format: date-time, description: "Timestamp of when cost data was last fetched from Azure. Only present when dataSource is live or cached." }
        budgetDataSource: { type: string, enum: [live, cached, estimated], description: "Indicates the origin of the budget and forecast figures: live = from Azure Budgets API, cached = last-known value from DB snapshot, estimated = formula fallback." }
        momChangePct: { type: number, nullable: true, description: "Month-over-month percentage change: (MTD this month − same-day-of-month last month) / same-day-of-month last month × 100. Positive = higher spend than last month at this point, negative = lower. Null when insufficient history." }
    RevenueSource:
      type: string
      enum: [stripe, app_store, play_store]
    RevenueBySource:
      type: object
      required: [source, label, amount]
      properties:
        source: { $ref: "#/components/schemas/RevenueSource" }
        label: { type: string, description: Human-readable source label }
        amount: { type: number }
    Revenue:
      type: object
      required: [currency, total, bySource]
      properties:
        currency: { type: string }
        total: { type: number, description: Month-to-date revenue across all configured sources }
        bySource:
          type: array
          items: { $ref: "#/components/schemas/RevenueBySource" }
    LedgerAccountType:
      type: string
      enum: [asset, liability, equity, revenue, expense]
    LedgerAccount:
      type: object
      required: [code, name, type, balance]
      properties:
        code: { type: string, description: Chart-of-accounts code }
        name: { type: string }
        type: { $ref: "#/components/schemas/LedgerAccountType" }
        balance: { type: number, description: Current balance in the ledger currency }
    LedgerReconciliation:
      type: object
      required: [status, lastReconciledAt, unreconciledCount, unreconciledAmount]
      properties:
        status: { type: string, enum: [reconciled, pending, discrepancy] }
        lastReconciledAt: { type: string, format: date-time }
        unreconciledCount: { type: integer, description: Number of journal entries not yet reconciled }
        unreconciledAmount: { type: number, description: Net value of unreconciled entries }
    LedgerTransaction:
      type: object
      required: [id, postedAt, description, debitAccount, creditAccount, amount, status]
      properties:
        id: { type: string }
        postedAt: { type: string, format: date-time }
        description: { type: string }
        debitAccount: { type: string, description: Chart-of-accounts code debited }
        creditAccount: { type: string, description: Chart-of-accounts code credited }
        amount: { type: number }
        status: { type: string, enum: [posted, pending, failed] }
    LedgerEntrySource:
      type: string
      enum: [stripe, app_store, play_store, bank, manual]
    LedgerJournalEntry:
      type: object
      required: [id, postedAt, description, debitAccount, creditAccount, amount, status, source]
      properties:
        id: { type: string }
        postedAt: { type: string, format: date-time }
        description: { type: string }
        debitAccount: { type: string, description: Chart-of-accounts code debited }
        creditAccount: { type: string, description: Chart-of-accounts code credited }
        amount: { type: number }
        status: { type: string, enum: [posted, pending, failed] }
        source: { $ref: "#/components/schemas/LedgerEntrySource" }
    PostLedgerEntryRequest:
      type: object
      required: [description, debitAccount, creditAccount, amount]
      properties:
        description: { type: string, minLength: 1 }
        debitAccount: { type: string, description: Chart-of-accounts code to debit }
        creditAccount: { type: string, description: Chart-of-accounts code to credit }
        amount: { type: number, exclusiveMinimum: 0 }
        source: { $ref: "#/components/schemas/LedgerEntrySource" }
        status: { type: string, enum: [posted, pending, failed], default: posted }
        postedAt: { type: string, format: date-time }
    LedgerRevenueBySource:
      type: object
      required: [source, label, feeRate, gross, fee, net]
      properties:
        source: { $ref: "#/components/schemas/LedgerEntrySource" }
        label: { type: string, description: Human-readable source label }
        feeRate: { type: number, description: Platform fee rate (e.g. 0.3 = 30%) }
        gross: { type: number, description: Gross revenue recognized from this source }
        fee: { type: number, description: Platform fee booked as expense for this source }
        net: { type: number, description: Net cash after the platform fee (gross - fee) }
    LedgerRevenue:
      type: object
      required: [grossRevenue, platformFees, netRevenue, bySource]
      properties:
        grossRevenue: { type: number, description: Total recognized revenue before platform fees }
        platformFees: { type: number, description: Total platform fees booked as expense }
        netRevenue: { type: number, description: Net revenue after platform fees }
        bySource:
          type: array
          items: { $ref: "#/components/schemas/LedgerRevenueBySource" }
    IngestSaleRequest:
      type: object
      required: [source, grossAmount]
      properties:
        source: { $ref: "#/components/schemas/LedgerEntrySource" }
        grossAmount: { type: number, exclusiveMinimum: 0, description: Gross sale amount before the platform fee }
        feeAmount:
          type: number
          minimum: 0
          description: >-
            Actual platform fee for this sale. When provided it overrides the
            flat schedule rate — used by live feeds (e.g. Stripe) that report the
            real per-transaction fee. Must not exceed grossAmount.
        description: { type: string, minLength: 1 }
        externalRef: { type: string, description: External transaction id for idempotent ingestion }
        status: { type: string, enum: [posted, pending, failed], default: posted }
        postedAt: { type: string, format: date-time }
    IngestSaleResult:
      type: object
      required: [source, feeRate, gross, fee, net, entries]
      properties:
        source: { $ref: "#/components/schemas/LedgerEntrySource" }
        created: { type: boolean, description: True when new legs were recorded; false on an idempotent replay }
        feeRate: { type: number, description: Effective platform fee rate booked (e.g. 0.3 = 30%) }
        gross: { type: number }
        fee: { type: number }
        net: { type: number, description: Net cash after the platform fee }
        entries:
          type: array
          description: The journal entries created (or already present) for this sale.
          items: { $ref: "#/components/schemas/LedgerJournalEntry" }
    StripeSyncSkip:
      type: object
      required: [chargeId, reason]
      properties:
        chargeId: { type: string }
        reason: { type: string }
    StripeSyncResult:
      type: object
      required: [fetched, imported, alreadyRecorded, skipped, gross, fee, net, skips]
      properties:
        fetched: { type: integer, description: Total Stripe charges examined }
        imported: { type: integer, description: Charges newly recorded in the ledger this run }
        alreadyRecorded: { type: integer, description: Charges already present (idempotent replays) }
        skipped: { type: integer, description: Charges skipped (not succeeded, non-USD, or errored) }
        gross: { type: number, description: Total gross of all valid Stripe sales in the ledger }
        fee: { type: number, description: Total actual Stripe fees booked }
        net: { type: number, description: Total net cash after Stripe fees }
        skips:
          type: array
          description: Per-charge skip reasons, capped for readability.
          items: { $ref: "#/components/schemas/StripeSyncSkip" }
    StoreSyncResult:
      type: object
      required: [month, appId, total, ingested, skipped, errors, totalGross, totalFee, dataSource]
      properties:
        month: { type: string, description: "Report month (YYYY-MM)" }
        appId: { type: string, description: Workload app id }
        total: { type: integer, description: Total rows examined in the report }
        ingested: { type: integer, description: Rows newly recorded as ledger entries }
        skipped: { type: integer, description: "Rows skipped (non-revenue event, already recorded, non-USD, or missing order id)" }
        errors: { type: integer, description: Rows that failed to ingest due to an unexpected error }
        totalGross: { type: number, description: Total gross revenue ingested this run (USD) }
        totalFee: { type: number, description: Total store fee booked as expense this run (USD) }
        dataSource:
          type: string
          enum: [app_store, play_store]
          description: Which store produced this result
    LedgerReport:
      type: object
      required: [currency, totalBalance, accounts, reconciliation, transactions, revenue]
      properties:
        currency: { type: string }
        totalBalance: { type: number, description: Net of asset balances (settlement position) }
        accounts:
          type: array
          items: { $ref: "#/components/schemas/LedgerAccount" }
        reconciliation: { $ref: "#/components/schemas/LedgerReconciliation" }
        transactions:
          type: array
          description: Most recent journal entries, newest first.
          items: { $ref: "#/components/schemas/LedgerTransaction" }
        revenue: { $ref: "#/components/schemas/LedgerRevenue" }
    TelemetryReport:
      type: object
      required: [requestsPerMin, p95LatencyMs, p95LatencyIsReal, errorRatePercent, availabilityPercent, series, topErrors, dataSource]
      properties:
        requestsPerMin: { type: number }
        p95LatencyMs: { type: number }
        p95LatencyIsReal: { type: boolean, description: "True when p95LatencyMs came from a real KQL percentile query against Log Analytics. False when it is an avg × 1.4 approximation (fallback when Log Analytics is not configured or the query fails)." }
        errorRatePercent: { type: number }
        availabilityPercent: { type: number }
        cpuPercent: { type: number, description: "Current CPU utilisation % derived from the last Log Analytics time-series point. Absent when Monitor is not configured." }
        memoryPercent: { type: number, description: "Current memory utilisation % derived from the last Log Analytics time-series point. Absent when Monitor is not configured." }
        series:
          type: array
          items: { $ref: "#/components/schemas/MetricSeries" }
        topErrors:
          type: array
          items: { $ref: "#/components/schemas/TopError" }
        dataSource: { type: string, enum: [live, mock], description: "Indicates whether telemetry comes from live Azure Monitor / Application Insights or built-in mock values." }
        cachedAt: { type: string, format: date-time, description: "Timestamp of when telemetry data was last fetched from Azure Monitor / Application Insights. Only present when dataSource is live." }
        appInsightsResourceId: { type: string, description: "Azure resource ID of the Application Insights component for this app. Present only when the resource has been resolved via Resource Graph. Used by the frontend to construct Azure Portal deep-links." }
    TopError:
      type: object
      required: [message, count, lastSeen]
      properties:
        message: { type: string }
        count: { type: integer }
        lastSeen: { type: string, format: date-time }
    Alert:
      type: object
      required: [id, appId, appName, title, severity, source, firedAt, status]
      properties:
        id: { type: string }
        appId: { type: string }
        appName: { type: string }
        title: { type: string }
        description: { type: string }
        severity: { $ref: "#/components/schemas/Severity" }
        source: { type: string, enum: [AzureMonitor, LogAnalytics, NetworkWatcher, CostManagement, ApplicationInsights, WebAppTelemetry] }
        firedAt: { type: string, format: date-time }
        status: { type: string, enum: [active, acknowledged, resolved] }
    GlobalHealth:
      type: object
      required: [totalApps, healthy, degraded, unhealthy, activeAlerts, monthToDateCost, currency]
      properties:
        totalApps: { type: integer }
        healthy: { type: integer }
        degraded: { type: integer }
        unhealthy: { type: integer }
        activeAlerts: { type: integer }
        monthToDateCost: { type: number }
        costDataSource: { type: string, enum: [live, cached, mock], description: "Indicates whether the aggregate monthToDateCost figure comes from live Azure Cost Management, a DB snapshot (cached), or built-in mock values. live = all apps live, cached = at least one app used a snapshot, mock = no live or cached data." }
        momTrendPct: { type: number, nullable: true, description: "Month-over-month cost trend as a percentage change vs the same elapsed days last month. Positive = higher spend this month, negative = lower spend. Omitted when Azure Cost Management is not configured." }
        currency: { type: string }
    ListDeploymentsResponse:
      type: object
      required: [deployments, dataSource]
      properties:
        deployments:
          type: array
          items: { $ref: "#/components/schemas/Deployment" }
        dataSource: { type: string, enum: [live, mock] }
        fetchedAt: { type: string, format: date-time, nullable: true, description: "ISO timestamp of when the data was fetched from GitHub. Null when data source is mock." }
    Deployment:
      type: object
      required: [id, appId, appName, environment, version, status, triggeredBy, startedAt, commitSha, pipeline, runType]
      properties:
        id: { type: string }
        appId: { type: string }
        appName: { type: string }
        environment: { type: string }
        version: { type: string }
        status: { type: string, enum: [Succeeded, Failed, InProgress, RolledBack] }
        triggeredBy: { type: string }
        startedAt: { type: string, format: date-time }
        durationSec: { type: integer, nullable: true }
        commitSha: { type: string }
        pipeline: { type: string }
        runType: { type: string, enum: [deploy, ci], description: "Whether this run is a deployment/release workflow or a CI workflow (typecheck, lint, test, etc.)." }
        runUrl: { type: string, description: "Direct link to this run on GitHub Actions." }
    ActivityEntry:
      type: object
      required: [id, timestamp, actor, action, target, status, category]
      properties:
        id: { type: string }
        timestamp: { type: string, format: date-time }
        actor: { type: string }
        action: { type: string }
        target: { type: string }
        appId: { type: string }
        status: { type: string, enum: [Succeeded, Failed, Started] }
        category: { type: string }
    LogLine:
      type: object
      required: [id, timestamp, appId, level, message]
      properties:
        id: { type: string }
        timestamp: { type: string, format: date-time }
        appId: { type: string }
        level: { type: string, enum: [INFO, WARN, ERROR] }
        message: { type: string }
    TagComplianceResponse:
      type: object
      required: [scannedAt, totalScanned, nonCompliantCount, entries, dataSource]
      properties:
        scannedAt: { type: string, format: date-time }
        totalScanned: { type: integer }
        nonCompliantCount: { type: integer }
        entries:
          type: array
          items: { $ref: "#/components/schemas/TagComplianceEntry" }
        dataSource: { type: string, enum: [live, unavailable, error] }
        errorMessage: { type: string, nullable: true }
    TagComplianceEntry:
      type: object
      required: [id, name, type, scope, subscriptionId, missingTags]
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        scope: { type: string, enum: [subscription, resource-group, resource] }
        subscriptionId: { type: string }
        resourceGroup: { type: string, nullable: true }
        missingTags:
          type: array
          items: { type: string }
    ServiceHealthResponse:
      type: object
      required: [events, liveEnabled, dataSource]
      properties:
        events:
          type: array
          items: { $ref: "#/components/schemas/ServiceHealthEvent" }
        liveEnabled:
          type: boolean
          description: True when Azure is configured and the query ran against live data.
        dataSource:
          type: string
          enum: [live, mock]
          description: Indicates whether events come from live Azure Service Health or mock data.
    ServiceHealthEvent:
      type: object
      required: [id, service, region, status, severity, title, startedAt]
      properties:
        id: { type: string }
        service: { type: string }
        region: { type: string }
        status: { type: string, enum: [Active, Resolved, Advisory] }
        severity: { type: string, enum: [Low, Medium, High] }
        title: { type: string }
        startedAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }
    SloRow:
      type: object
      required: [appId, appName, environment, uptimePct, errorBudgetRemainingPct, p95LatencyMs, p95LatencyIsReal, p95TargetMs, errorRatePct, errorTargetPct, cpuPct, cpuThreshold, memoryPct, memoryThreshold]
      properties:
        appId: { type: string }
        appName: { type: string }
        environment: { type: string }
        uptimePct: { type: number }
        errorBudgetRemainingPct: { type: number }
        p95LatencyMs: { type: number }
        p95LatencyIsReal: { type: boolean, description: "True when p95LatencyMs came from a real KQL percentile query against Log Analytics. False when it is an avg × 1.4 approximation (fallback when Log Analytics is not configured or the query fails)." }
        p95TargetMs: { type: number }
        errorRatePct: { type: number }
        errorTargetPct: { type: number }
        cpuPct: { type: number }
        cpuThreshold: { type: number }
        memoryPct: { type: number }
        memoryThreshold: { type: number }
        cpuSeries:
          type: array
          items: { $ref: "#/components/schemas/MetricPoint" }
          description: "24-hour CPU % time-series (live from Monitor or mock). Omitted when data is unavailable."
        memorySeries:
          type: array
          items: { $ref: "#/components/schemas/MetricPoint" }
          description: "24-hour memory % time-series (live from Monitor or mock). Omitted when data is unavailable."
    SlosResponse:
      type: object
      required: [rows, dataSource]
      properties:
        rows:
          type: array
          items: { $ref: "#/components/schemas/SloRow" }
        dataSource: { type: string, enum: [live, mock], description: "Indicates whether SLO metrics come from live Azure Monitor or built-in mock values." }
        dataAsOf: { type: string, format: date-time, description: "Timestamp of when SLO data was last fetched from Azure Monitor. Only present when dataSource is live." }
    GlobalEndpointsResponse:
      type: object
      required: [endpoints, liveEnabled, dataSource]
      properties:
        endpoints:
          type: array
          items: { $ref: "#/components/schemas/GlobalEndpointRow" }
        liveEnabled:
          type: boolean
          description: Whether Azure is configured and live endpoint data is being served.
        dataSource:
          type: string
          enum: [live, mock, none]
          description: "'live' = Azure Resource Graph query succeeded, 'mock' = Azure configured but query returned no resources, 'none' = Azure not configured."
        dataAsOf:
          type: string
          format: date-time
          description: "Timestamp of when endpoint data was last fetched from Azure Resource Graph. Only present when dataSource is live."
    GlobalEndpointRow:
      type: object
      required: [id, appId, appName, name, region, status, latencyMs, packetLossPercent]
      properties:
        id: { type: string }
        appId: { type: string }
        appName: { type: string }
        name: { type: string }
        region: { type: string }
        status: { $ref: "#/components/schemas/Status" }
        latencyMs: { type: number }
        packetLossPercent: { type: number }
    GlobalCostByAppItem:
      type: object
      required: [appId, appName, environment, monthToDate]
      properties:
        appId: { type: string }
        appName: { type: string }
        environment: { type: string }
        monthToDate: { type: number, description: Month-to-date spend in USD }
        trend: { type: string, nullable: true, description: "Week-over-week percentage change (e.g. '+8.2%' or '-3.1%'). Null when insufficient data." }
    GetGlobalCostSummaryResponse:
      type: object
      required: [total, currency, byApp, dataSource]
      properties:
        total: { type: number, description: Sum of MTD spend across all apps }
        currency: { type: string }
        byApp:
          type: array
          items: { $ref: "#/components/schemas/GlobalCostByAppItem" }
        dataSource: { type: string, enum: [live, cached, mock] }
        dataAsOf: { type: string, format: date-time, nullable: true, description: "Timestamp of the most recent live or cached data point across all apps." }
        wowTrend: { type: string, nullable: true, description: "Spend-weighted week-over-week percentage change across all apps (e.g. '+8.2%' or '-3.1%'). Null when insufficient data." }
    BudgetAlertLogPage:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items: { $ref: "#/components/schemas/BudgetAlertLogEntry" }
        total:
          type: integer
          description: Total number of matching entries (used for pagination)
    BudgetAlertLogEntry:
      type: object
      required: [id, appId, appName, mtd, forecast, budget, channels, sentAt]
      properties:
        id: { type: integer }
        appId: { type: string }
        appName: { type: string }
        mtd: { type: number, description: Month-to-date spend at alert time }
        forecast: { type: number, description: End-of-month cost forecast at alert time }
        budget: { type: number, description: Budget cap at alert time }
        channels:
          type: array
          items: { type: string }
          description: Notification channels that fired (e.g. "teams", "email")
        sentAt: { type: string, format: date-time, description: When the notification was dispatched }
        acknowledgedAt: { type: string, format: date-time, nullable: true, description: When the entry was acknowledged by an operator. Null if not yet acknowledged. }
        acknowledgedNote: { type: string, nullable: true, description: Optional freetext note left by the operator when acknowledging. }
        acknowledgedBy: { type: string, nullable: true, description: Display name or UPN of the operator who acknowledged this alert. }
    AcknowledgeBudgetAlertBody:
      type: object
      properties:
        note:
          type: string
          maxLength: 500
          description: Optional freetext note (e.g. "spike from load test, safe to ignore")
    AlertChannelStatus:
      type: object
      required: [teams, email]
      description: Which notification channels are currently configured (env vars present). No secrets are exposed.
      properties:
        teams:
          type: boolean
          description: True when ALERT_TEAMS_WEBHOOK_URL (global or per-app) is set
        email:
          type: boolean
          description: True when ALERT_SMTP_HOST + ALERT_SMTP_FROM + ALERT_EMAIL_TO are all set
    UpdateAlertConfigBody:
      type: object
      description: Per-app infra alert threshold overrides. Pass null for a field to clear the DB override and revert to env-var / global default.
      properties:
        cpuThresholdPct:
          type: integer
          minimum: 1
          maximum: 100
          nullable: true
          description: CPU alert threshold (percent). Null clears the DB override.
        memoryThresholdPct:
          type: integer
          minimum: 1
          maximum: 100
          nullable: true
          description: Memory alert threshold (percent). Null clears the DB override.
        consecutiveChecks:
          type: integer
          minimum: 1
          nullable: true
          description: Consecutive over-threshold checks required before a notification fires. Null clears the DB override.
        cooldownHours:
          type: integer
          minimum: 1
          nullable: true
          description: Minimum hours between repeat alert notifications for this app. Null clears the DB override and reverts to env-var / global default (12h).
    AppAlertConfig:
      type: object
      required: [appId, appName, cpuThresholdPct, memoryThresholdPct, cpuIsOverride, memoryIsOverride, consecutiveChecks, consecutiveChecksIsOverride, cooldownHours, cooldownIsOverride]
      properties:
        appId: { type: string }
        appName: { type: string }
        cpuThresholdPct:
          type: number
          description: Effective CPU alert threshold (percent)
        memoryThresholdPct:
          type: number
          description: Effective memory alert threshold (percent)
        cpuIsOverride:
          type: boolean
          description: True when a per-app DB or env-var value overrides the global default
        memoryIsOverride:
          type: boolean
          description: True when a per-app DB or env-var value overrides the global default
        consecutiveChecks:
          type: integer
          description: Number of consecutive over-threshold scheduler checks required before a notification fires
        consecutiveChecksIsOverride:
          type: boolean
          description: True when a per-app DB or env-var value overrides the global default
        cooldownHours:
          type: number
          description: Effective alert cooldown window in hours (minimum time between repeat notifications)
        cooldownIsOverride:
          type: boolean
          description: True when a per-app ALERT_COOLDOWN_HOURS__<APPID> env var overrides the global default
        cpuSource:
          type: string
          enum: [db, env, inventory, default]
          description: "Which source provides the effective CPU threshold: db = operator-saved DB override, env = per-app env var (ALERT_CPU_THRESHOLD_PCT__<APPID>), inventory = app built-in baseline from the APPS record, default = global env var or hardcoded 80%"
        memorySource:
          type: string
          enum: [db, env, inventory, default]
          description: "Which source provides the effective memory threshold: db = operator-saved DB override, env = per-app env var (ALERT_MEMORY_THRESHOLD_PCT__<APPID>), inventory = app built-in baseline from the APPS record, default = global env var or hardcoded 85%"
        consecutiveChecksSource:
          type: string
          enum: [db, env, default]
          description: Which source provides the effective consecutive-checks value
        cooldownSource:
          type: string
          enum: [db, env, appconfig, default]
          description: "Which source provides the effective cooldown (db = Orbit UI override, env = ALERT_COOLDOWN_HOURS[__APPID], appconfig = Azure App Configuration key ALERT_COOLDOWN_HOURS, default = 12h built-in)"
        silencedUntil:
          type: string
          format: date-time
          nullable: true
          description: ISO-8601 timestamp at which the app's active alert cooldown expires; null when the app is not currently silenced
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When a DB override was last saved for this app
        updatedBy:
          type: string
          nullable: true
          description: Display name / UPN of the operator who last saved DB overrides
        cpuEnvValue:
          type: number
          nullable: true
          description: Raw env-var value for CPU threshold (per-app or global) if any env var is set; null when no env var is configured. Useful for surfacing a conflict when source is "db".
        cpuEnvVarName:
          type: string
          nullable: true
          description: The env-var name that produced cpuEnvValue (e.g. ALERT_CPU_THRESHOLD_PCT__GRAILBABE); null when cpuEnvValue is null.
        memoryEnvValue:
          type: number
          nullable: true
          description: Raw env-var value for memory threshold (per-app or global) if any env var is set; null when no env var is configured.
        memoryEnvVarName:
          type: string
          nullable: true
          description: The env-var name that produced memoryEnvValue; null when memoryEnvValue is null.
        consecutiveChecksEnvValue:
          type: integer
          nullable: true
          description: Raw env-var value for consecutive checks if any env var is set; null when no env var is configured.
        consecutiveChecksEnvVarName:
          type: string
          nullable: true
          description: The env-var name that produced consecutiveChecksEnvValue; null when consecutiveChecksEnvValue is null.
    AppThresholds:
      type: object
      required: [appId, cpuThreshold, memoryThreshold, updatedBy]
      properties:
        appId: { type: string }
        cpuThreshold: { type: number, description: "CPU utilisation % at which the SLO badge turns warning/critical." }
        memoryThreshold: { type: number, description: "Memory utilisation % at which the SLO badge turns warning/critical." }
        updatedBy: { type: string, description: "UPN of the operator who last changed the thresholds, or 'system' when still at defaults (no DB override)." }
        updatedAt: { type: string, format: date-time, description: "When the thresholds were last changed by an operator. Absent when still at defaults (no DB override)." }
    UpdateAppThresholdsBody:
      type: object
      required: [cpuThreshold, memoryThreshold]
      properties:
        cpuThreshold: { type: number, minimum: 1, maximum: 100 }
        memoryThreshold: { type: number, minimum: 1, maximum: 100 }
    AppThresholdsLogEntry:
      type: object
      required: [id, appId, newCpuThreshold, newMemoryThreshold, changedBy, changedAt]
      properties:
        id: { type: integer }
        appId: { type: string }
        oldCpuThreshold: { type: number, nullable: true, description: "CPU threshold before this change (null for the first-ever set)" }
        newCpuThreshold: { type: number, description: "CPU threshold set by this change" }
        oldMemoryThreshold: { type: number, nullable: true, description: "Memory threshold before this change (null for the first-ever set)" }
        newMemoryThreshold: { type: number, description: "Memory threshold set by this change" }
        changedBy: { type: string, description: "UPN / identifier of the operator who made the change" }
        changedAt: { type: string, format: date-time, description: "When the change was recorded" }
    AlertThresholdConfigLogEntry:
      type: object
      required: [id, appId, changedBy, changedAt]
      properties:
        id: { type: integer }
        appId: { type: string }
        oldCpuThresholdPct:
          type: integer
          nullable: true
          description: CPU threshold before this change (null = no prior DB override)
        newCpuThresholdPct:
          type: integer
          nullable: true
          description: CPU threshold set by this change (null = override was cleared)
        oldMemoryThresholdPct:
          type: integer
          nullable: true
          description: Memory threshold before this change (null = no prior DB override)
        newMemoryThresholdPct:
          type: integer
          nullable: true
          description: Memory threshold set by this change (null = override was cleared)
        oldConsecutiveChecks:
          type: integer
          nullable: true
          description: Consecutive-checks before this change (null = no prior DB override)
        newConsecutiveChecks:
          type: integer
          nullable: true
          description: Consecutive-checks set by this change (null = override was cleared)
        oldCooldownHours:
          type: integer
          nullable: true
          description: Cooldown hours before this change (null = no prior DB override)
        newCooldownHours:
          type: integer
          nullable: true
          description: Cooldown hours set by this change (null = override was cleared)
        changedBy:
          type: string
          description: Display name / UPN of the operator who made the change
        changedAt:
          type: string
          format: date-time
          description: When the change was recorded
    AppThresholdsLogPage:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AppThresholdsLogEntry" }
        total:
          type: integer
          description: Total number of history entries for this app (used for pagination)
    InfraAlertLogPage:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items: { $ref: "#/components/schemas/InfraAlertLogEntry" }
        total:
          type: integer
          description: Total number of matching entries (used for pagination)
    InfraAlertLogEntry:
      type: object
      required: [id, appId, appName, metric, value, threshold, channels, sentAt]
      properties:
        id: { type: integer }
        appId: { type: string }
        appName: { type: string }
        metric: { type: string, description: "Which metric breached — 'cpu' or 'memory'" }
        value: { type: number, description: Observed metric value (percent) at alert time }
        threshold: { type: number, description: Configured threshold (percent) that was exceeded }
        channels:
          type: array
          items: { type: string }
          description: Notification channels that fired (e.g. "teams", "email")
        sentAt: { type: string, format: date-time, description: When the notification was dispatched }
        acknowledgedAt: { type: string, format: date-time, nullable: true, description: When the entry was acknowledged by an operator. Null if not yet acknowledged. }
        acknowledgedBy: { type: string, nullable: true, description: Display name (or UPN) of the operator who acknowledged the alert. Null if not yet acknowledged. }
