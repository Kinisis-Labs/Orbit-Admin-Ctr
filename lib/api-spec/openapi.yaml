openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Global App Admin Center API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: apps
    description: Monitored applications
  - name: subscriptions
    description: App store subscription financials
  - name: infrastructure
    description: Azure infrastructure metrics
  - name: network
    description: Network telemetry
  - name: cost
    description: Azure cost management
  - name: telemetry
    description: Application telemetry
  - name: alerts
    description: Alerts and incidents
  - name: ledger
    description: Per-app financial ledger
  - name: global
    description: Global cross-app views
  - name: users
    description: End-user activity (Clerk-sourced) for consumer apps
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }
  /apps:
    get:
      operationId: listApps
      tags: [apps]
      summary: List monitored applications
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AppSummary" }
  /apps/{appId}:
    get:
      operationId: getApp
      tags: [apps]
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppDetail" }
  /apps/{appId}/infrastructure:
    get:
      operationId: getInfrastructure
      tags: [infrastructure]
      parameters:
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/Refresh"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InfrastructureReport" }
  /apps/{appId}/network:
    get:
      operationId: getNetwork
      tags: [network]
      parameters:
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/Refresh"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NetworkReport" }
  /apps/{appId}/cost:
    get:
      operationId: getCost
      tags: [cost]
      parameters:
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/Refresh"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CostReport" }
  /apps/{appId}/telemetry:
    get:
      operationId: getTelemetry
      tags: [telemetry]
      parameters:
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/Refresh"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TelemetryReport" }
  /apps/{appId}/alerts:
    get:
      operationId: getAppAlerts
      tags: [alerts]
      parameters:
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/Refresh"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Alert" }
  /apps/{appId}/ledger:
    get:
      operationId: getLedger
      tags: [ledger]
      summary: Financial ledger (balances, reconciliation, recent transactions) for an app
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LedgerReport" }
  /apps/{appId}/ledger/entries:
    get:
      operationId: listLedgerEntries
      tags: [ledger]
      summary: List journal entries for an app, newest first
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LedgerJournalEntry" }
    post:
      operationId: postLedgerEntry
      tags: [ledger]
      summary: Post a new balanced double-entry journal entry
      parameters:
        - $ref: "#/components/parameters/AppId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostLedgerEntryRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LedgerJournalEntry" }
        "400":
          description: Invalid entry (unbalanced, unknown account, or bad amount)
        "404":
          description: App not found
  /apps/{appId}/ledger/sales:
    post:
      operationId: ingestLedgerSale
      tags: [ledger]
      summary: Ingest a platform sale, netting out the platform fee into the ledger
      description: >-
        Records a sale as a balanced pair of journal entries: gross revenue
        recognized and the platform fee (Apple 30%, Google 15%, Stripe 3%) booked
        as an expense, leaving net cash correct. Idempotent on (source, externalRef).
      parameters:
        - $ref: "#/components/parameters/AppId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IngestSaleRequest" }
      responses:
        "201":
          description: Sale recorded (or already recorded — idempotent)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IngestSaleResult" }
        "400":
          description: Invalid sale (bad amount, unknown source, or missing accounts)
        "404":
          description: App not found
  /apps/{appId}/ledger/stripe/sync:
    post:
      operationId: syncStripeSales
      tags: [ledger]
      summary: Import live Stripe charges into the app's ledger with their actual fees
      description: >-
        Pulls succeeded Stripe charges and records each as a balanced sale,
        booking Stripe's actual reported per-transaction fee as the platform-fee
        expense. Idempotent on the Stripe charge id, so re-running is safe.
        Enabled for GrailBabe only.
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: Sync completed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StripeSyncResult" }
        "400":
          description: Stripe sync is not enabled for this app
        "404":
          description: App not found
        "503":
          description: Stripe is not connected
  /apps/{appId}/ledger/reconcile:
    post:
      operationId: reconcileLedger
      tags: [ledger]
      summary: Run reconciliation for an app's ledger and persist the result
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LedgerReconciliation" }
        "404":
          description: App not found
  /global/health:
    get:
      operationId: getGlobalHealth
      tags: [global]
      summary: Global health overview across all apps
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlobalHealth" }
  /global/alerts:
    get:
      operationId: listGlobalAlerts
      tags: [global, alerts]
      summary: All alerts across all apps (any status)
      parameters:
        - $ref: "#/components/parameters/Refresh"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Alert" }
  /global/cost-summary:
    get:
      operationId: getGlobalCostSummary
      tags: [global, cost]
      summary: Cost summary across all apps
      parameters:
        - $ref: "#/components/parameters/Refresh"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlobalCostSummary" }
  /users/activity:
    get:
      operationId: listUserActivity
      tags: [users]
      summary: Per-app end-user activity (Clerk-sourced aggregate counts)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UserActivityRow" }
  /play/subscriptions:
    get:
      operationId: listPlaySubscriptions
      tags: [subscriptions]
      summary: Per-app Google Play subscription states + revenue (placeholder until the app is live)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PlaySubscriptionRow" }
  /apple/subscriptions:
    get:
      operationId: listAppleSubscriptions
      tags: [subscriptions]
      summary: Per-app Apple App Store subscription states + revenue (placeholder until credentials are provisioned)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AppleSubscriptionRow" }
  /apps/{appId}/deployments:
    get:
      operationId: listDeployments
      tags: [apps]
      summary: GitHub Actions workflow runs for this app (last 50 runs). Returns [] when GITHUB_TOKEN is absent.
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Deployment" }
  /apps/{appId}/activity:
    get:
      operationId: listActivityLog
      tags: [apps]
      summary: Azure Activity Log events for this app's resource group (last 7 days). Returns [] when Azure is unconfigured.
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActivityEntry" }
  /apps/{appId}/logs:
    get:
      operationId: queryLogs
      tags: [apps]
      summary: KQL query against the centralised Log Analytics workspace. Returns [] when AZURE_LOG_ANALYTICS_WORKSPACE_ID is absent.
      parameters:
        - $ref: "#/components/parameters/AppId"
        - name: q
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LogLine" }
  /global/service-health:
    get:
      operationId: listServiceHealth
      tags: [global]
      summary: Azure Service Health events for all monitored subscriptions. Returns [] when Azure is unconfigured.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ServiceHealthEvent" }
  /global/slos:
    get:
      operationId: listSlos
      tags: [global]
      summary: Per-application SLO snapshot derived from Azure Monitor. Returns [] when Azure is unconfigured.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SloRow" }
  /global/endpoints:
    get:
      operationId: listGlobalEndpoints
      tags: [global]
      summary: Cross-application network endpoint health from Azure. Returns [] when Azure is unconfigured.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GlobalEndpointRow" }
components:
  parameters:
    AppId:
      name: appId
      in: path
      required: true
      schema: { type: string }
    Refresh:
      name: refresh
      in: query
      required: false
      description: When true, bypasses the in-process server-side cache and fetches fresh data from Azure.
      schema: { type: boolean }
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }
    Status:
      type: string
      enum: [healthy, degraded, unhealthy, unknown]
    Severity:
      type: string
      enum: [info, warning, error, critical]
    UserAuthType:
      type: string
      enum: [clerk, entra, none]
      description: >-
        Identity system that authenticates this app's end users.
        "clerk" = consumer app with Clerk-authenticated users (activity ingested via webhooks).
        "entra" = employee-only internal tool authenticated via Entra ID.
        "none" = no end-user authentication (e.g. public marketing site).
    AppTags:
      type: object
      description: >-
        Azure resource tags applied to this application's resource group.
        The five standard Kinisis tag keys are typed explicitly; any additional
        tags on the resource group are preserved as free-form string values.
      properties:
        workload:
          type: string
          description: Workload identifier matching the Azure workload tag (e.g. "GrailBabeProd").
        environment:
          type: string
          description: Deployment environment tag value (e.g. "prod", "staging", "dev").
        owner:
          type: string
          description: Team or individual responsible for this workload.
        cost-center:
          type: string
          description: FinOps cost-center code (e.g. "CC-GrailBabeProd").
        criticality:
          type: string
          description: "Business criticality classification (e.g. mission-critical, high, medium, low)."
    AppSummary:
      type: object
      required: [id, name, environment, region, status, resourceGroup, subscriptionId, tags, activeAlerts, monthToDateCost, userAuth]
      properties:
        id: { type: string }
        name: { type: string }
        environment: { type: string, enum: [prod, staging, dev] }
        region: { type: string }
        resourceGroup: { type: string }
        subscriptionId: { type: string }
        subscriptionName: { type: string, description: "Human-readable Azure subscription display name. Only present when Azure is configured." }
        tags:
          $ref: "#/components/schemas/AppTags"
        status: { $ref: "#/components/schemas/Status" }
        activeAlerts: { type: integer }
        monthToDateCost: { type: number }
        budget: { type: number, description: "Monthly budget cap in USD from Azure Cost Management. Only present when a budget is configured in Azure." }
        forecast: { type: number, description: "Projected end-of-month spend in USD from Azure Cost Management Forecast API. Only present when Azure is configured." }
        group: { type: string, description: Optional scope-selector grouping label (e.g. Platform). }
        userAuth:
          $ref: "#/components/schemas/UserAuthType"
    AppDetail:
      allOf:
        - $ref: "#/components/schemas/AppSummary"
        - type: object
          required: [owners, userAuth]
          properties:
            description: { type: string }
            owners:
              type: array
              items: { type: string }
            userAuth:
              $ref: "#/components/schemas/UserAuthType"
            androidPackage:
              type: string
              description: >-
                Google Play package name when this app ships a tracked Android build.
                Presence flags the app for the Play subscriptions surface.
            iosBundle:
              type: string
              description: >-
                Apple App Store bundle identifier when this app ships a tracked iOS build.
                Presence flags the app for the App Store subscriptions surface.
            appRepo:
              type: string
              description: >-
                GitHub repository name (under the Kinisis-Labs org) used to fetch
                deployment history from GitHub Actions. Absent for apps without a
                tracked CI/CD pipeline.
    UserActivityRow:
      type: object
      required: [appId, appName, environment, totalMembers, dau, wau, mau, inactive30d, newLast7d, dauTrendPct]
      properties:
        appId: { type: string }
        appName: { type: string }
        environment: { type: string }
        totalMembers: { type: integer }
        dau: { type: integer }
        wau: { type: integer }
        mau: { type: integer }
        inactive30d: { type: integer }
        newLast7d: { type: integer }
        dauTrendPct: { type: number }
    PlaySubscriptionRow:
      type: object
      required: [appId, appName, environment, packageName, activeSubscribers, canceledSubscribers, expiredSubscribers, mrr, revenueLast30d, currency, activeTrendPct, dataSource]
      properties:
        appId: { type: string }
        appName: { type: string }
        environment: { type: string }
        packageName: { type: string }
        activeSubscribers: { type: integer, description: Currently active/paying subscribers }
        canceledSubscribers: { type: integer, description: Auto-renew turned off but still within the paid term }
        expiredSubscribers: { type: integer, description: Lapsed/churned subscribers (inactive) }
        mrr: { type: number, description: Monthly recurring revenue in the reported currency }
        revenueLast30d: { type: number, description: Subscription revenue over the trailing 30 days }
        currency: { type: string }
        activeTrendPct: { type: number, description: Active-subscriber change vs the prior period }
        dataSource: { type: string, enum: [placeholder, live] }
    AppleSubscriptionRow:
      type: object
      required: [appId, appName, environment, bundleId, activeSubscribers, canceledSubscribers, expiredSubscribers, mrr, revenueLast30d, currency, activeTrendPct, dataSource]
      properties:
        appId: { type: string }
        appName: { type: string }
        environment: { type: string }
        bundleId: { type: string }
        activeSubscribers: { type: integer, description: Currently active/paying subscribers }
        canceledSubscribers: { type: integer, description: Auto-renew turned off but still within the paid term }
        expiredSubscribers: { type: integer, description: Lapsed/churned subscribers (inactive) }
        mrr: { type: number, description: Monthly recurring revenue in the reported currency }
        revenueLast30d: { type: number, description: Subscription revenue over the trailing 30 days }
        currency: { type: string }
        activeTrendPct: { type: number, description: Active-subscriber change vs the prior period }
        dataSource: { type: string, enum: [placeholder, live] }
    MetricPoint:
      type: object
      required: [timestamp, value]
      properties:
        timestamp: { type: string, format: date-time }
        value: { type: number }
    DailyCostPoint:
      type: object
      required: [timestamp, value]
      properties:
        timestamp: { type: string, format: date-time }
        value: { type: number }
        vsLastWeek: { type: number, nullable: true, description: "Percentage change vs the same day 7 days ago. Positive = higher spend, negative = lower. Omitted when comparison data is unavailable (first 7 days of the series)." }
    MetricSeries:
      type: object
      required: [name, unit, points]
      properties:
        name: { type: string }
        unit: { type: string }
        points:
          type: array
          items: { $ref: "#/components/schemas/MetricPoint" }
    InfrastructureResource:
      type: object
      required: [id, name, type, status, location]
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        status: { $ref: "#/components/schemas/Status" }
        location: { type: string }
        cpuPercent: { type: number }
        memoryPercent: { type: number }
    InfrastructureReport:
      type: object
      required: [resources, series, dataSource]
      properties:
        resources:
          type: array
          items: { $ref: "#/components/schemas/InfrastructureResource" }
        series:
          type: array
          items: { $ref: "#/components/schemas/MetricSeries" }
        dataSource: { type: string, enum: [live, mock], description: "Indicates whether resource data comes from live Azure Resource Graph or built-in mock values." }
    NetworkEndpoint:
      type: object
      required: [name, status, latencyMs, region]
      properties:
        name: { type: string }
        status: { $ref: "#/components/schemas/Status" }
        latencyMs: { type: number }
        packetLossPercent: { type: number }
        region: { type: string }
    NetworkReport:
      type: object
      required: [endpoints, throughput]
      properties:
        endpoints:
          type: array
          items: { $ref: "#/components/schemas/NetworkEndpoint" }
        throughput:
          type: array
          items: { $ref: "#/components/schemas/MetricSeries" }
    CostByService:
      type: object
      required: [service, amount]
      properties:
        service: { type: string }
        amount: { type: number }
        trend: { type: string, nullable: true, description: "Week-over-week percentage change (e.g. '+8.2%' or '-3.1%'). Omitted when insufficient data." }
    ApiByName:
      type: object
      required: [name, totalCalls, cost]
      properties:
        name: { type: string, description: Logical API operation or endpoint name }
        totalCalls: { type: integer }
        cost: { type: number }
    ApiUsage:
      type: object
      required: [totalCalls, costPerMillion, cost, byApi]
      description: API consumption (API Management + gateway egress) included in monthToDate.
      properties:
        totalCalls: { type: integer, description: Month-to-date API call count }
        costPerMillion: { type: number, description: Blended unit price per million calls }
        cost: { type: number, description: Month-to-date API usage cost }
        byApi:
          type: array
          description: Cost breakdown by individual API name (operation / endpoint).
          items: { $ref: "#/components/schemas/ApiByName" }
    CostReport:
      type: object
      required: [currency, monthToDate, forecast, budget, daily, byService, apiUsage, revenue, dataSource]
      properties:
        currency: { type: string }
        monthToDate: { type: number }
        forecast: { type: number }
        budget: { type: number }
        daily:
          type: array
          items: { $ref: "#/components/schemas/DailyCostPoint" }
        byService:
          type: array
          items: { $ref: "#/components/schemas/CostByService" }
        apiUsage: { $ref: "#/components/schemas/ApiUsage" }
        revenue: { $ref: "#/components/schemas/Revenue" }
        dataSource: { type: string, enum: [live, mock], description: "Indicates whether cost figures come from live Azure Cost Management or built-in mock values." }
        dataAsOf: { type: string, format: date-time, description: "Timestamp of when cost data was last fetched from Azure. Only present when dataSource is live." }
        budgetDataSource: { type: string, enum: [live, cached, estimated], description: "Indicates the origin of the budget and forecast figures: live = from Azure Budgets API, cached = last-known value from DB snapshot, estimated = formula fallback." }
    RevenueSource:
      type: string
      enum: [stripe, app_store, play_store]
    RevenueBySource:
      type: object
      required: [source, label, amount]
      properties:
        source: { $ref: "#/components/schemas/RevenueSource" }
        label: { type: string, description: Human-readable source label }
        amount: { type: number }
    Revenue:
      type: object
      required: [currency, total, bySource]
      properties:
        currency: { type: string }
        total: { type: number, description: Month-to-date revenue across all configured sources }
        bySource:
          type: array
          items: { $ref: "#/components/schemas/RevenueBySource" }
    LedgerAccountType:
      type: string
      enum: [asset, liability, equity, revenue, expense]
    LedgerAccount:
      type: object
      required: [code, name, type, balance]
      properties:
        code: { type: string, description: Chart-of-accounts code }
        name: { type: string }
        type: { $ref: "#/components/schemas/LedgerAccountType" }
        balance: { type: number, description: Current balance in the ledger currency }
    LedgerReconciliation:
      type: object
      required: [status, lastReconciledAt, unreconciledCount, unreconciledAmount]
      properties:
        status: { type: string, enum: [reconciled, pending, discrepancy] }
        lastReconciledAt: { type: string, format: date-time }
        unreconciledCount: { type: integer, description: Number of journal entries not yet reconciled }
        unreconciledAmount: { type: number, description: Net value of unreconciled entries }
    LedgerTransaction:
      type: object
      required: [id, postedAt, description, debitAccount, creditAccount, amount, status]
      properties:
        id: { type: string }
        postedAt: { type: string, format: date-time }
        description: { type: string }
        debitAccount: { type: string, description: Chart-of-accounts code debited }
        creditAccount: { type: string, description: Chart-of-accounts code credited }
        amount: { type: number }
        status: { type: string, enum: [posted, pending, failed] }
    LedgerEntrySource:
      type: string
      enum: [stripe, app_store, play_store, bank, manual]
    LedgerJournalEntry:
      type: object
      required: [id, postedAt, description, debitAccount, creditAccount, amount, status, source]
      properties:
        id: { type: string }
        postedAt: { type: string, format: date-time }
        description: { type: string }
        debitAccount: { type: string, description: Chart-of-accounts code debited }
        creditAccount: { type: string, description: Chart-of-accounts code credited }
        amount: { type: number }
        status: { type: string, enum: [posted, pending, failed] }
        source: { $ref: "#/components/schemas/LedgerEntrySource" }
    PostLedgerEntryRequest:
      type: object
      required: [description, debitAccount, creditAccount, amount]
      properties:
        description: { type: string, minLength: 1 }
        debitAccount: { type: string, description: Chart-of-accounts code to debit }
        creditAccount: { type: string, description: Chart-of-accounts code to credit }
        amount: { type: number, exclusiveMinimum: 0 }
        source: { $ref: "#/components/schemas/LedgerEntrySource" }
        status: { type: string, enum: [posted, pending, failed], default: posted }
        postedAt: { type: string, format: date-time }
    LedgerRevenueBySource:
      type: object
      required: [source, label, feeRate, gross, fee, net]
      properties:
        source: { $ref: "#/components/schemas/LedgerEntrySource" }
        label: { type: string, description: Human-readable source label }
        feeRate: { type: number, description: Platform fee rate (e.g. 0.3 = 30%) }
        gross: { type: number, description: Gross revenue recognized from this source }
        fee: { type: number, description: Platform fee booked as expense for this source }
        net: { type: number, description: Net cash after the platform fee (gross - fee) }
    LedgerRevenue:
      type: object
      required: [grossRevenue, platformFees, netRevenue, bySource]
      properties:
        grossRevenue: { type: number, description: Total recognized revenue before platform fees }
        platformFees: { type: number, description: Total platform fees booked as expense }
        netRevenue: { type: number, description: Net revenue after platform fees }
        bySource:
          type: array
          items: { $ref: "#/components/schemas/LedgerRevenueBySource" }
    IngestSaleRequest:
      type: object
      required: [source, grossAmount]
      properties:
        source: { $ref: "#/components/schemas/LedgerEntrySource" }
        grossAmount: { type: number, exclusiveMinimum: 0, description: Gross sale amount before the platform fee }
        feeAmount:
          type: number
          minimum: 0
          description: >-
            Actual platform fee for this sale. When provided it overrides the
            flat schedule rate — used by live feeds (e.g. Stripe) that report the
            real per-transaction fee. Must not exceed grossAmount.
        description: { type: string, minLength: 1 }
        externalRef: { type: string, description: External transaction id for idempotent ingestion }
        status: { type: string, enum: [posted, pending, failed], default: posted }
        postedAt: { type: string, format: date-time }
    IngestSaleResult:
      type: object
      required: [source, feeRate, gross, fee, net, entries]
      properties:
        source: { $ref: "#/components/schemas/LedgerEntrySource" }
        created: { type: boolean, description: True when new legs were recorded; false on an idempotent replay }
        feeRate: { type: number, description: Effective platform fee rate booked (e.g. 0.3 = 30%) }
        gross: { type: number }
        fee: { type: number }
        net: { type: number, description: Net cash after the platform fee }
        entries:
          type: array
          description: The journal entries created (or already present) for this sale.
          items: { $ref: "#/components/schemas/LedgerJournalEntry" }
    StripeSyncSkip:
      type: object
      required: [chargeId, reason]
      properties:
        chargeId: { type: string }
        reason: { type: string }
    StripeSyncResult:
      type: object
      required: [fetched, imported, alreadyRecorded, skipped, gross, fee, net, skips]
      properties:
        fetched: { type: integer, description: Total Stripe charges examined }
        imported: { type: integer, description: Charges newly recorded in the ledger this run }
        alreadyRecorded: { type: integer, description: Charges already present (idempotent replays) }
        skipped: { type: integer, description: Charges skipped (not succeeded, non-USD, or errored) }
        gross: { type: number, description: Total gross of all valid Stripe sales in the ledger }
        fee: { type: number, description: Total actual Stripe fees booked }
        net: { type: number, description: Total net cash after Stripe fees }
        skips:
          type: array
          description: Per-charge skip reasons, capped for readability.
          items: { $ref: "#/components/schemas/StripeSyncSkip" }
    LedgerReport:
      type: object
      required: [currency, totalBalance, accounts, reconciliation, transactions, revenue]
      properties:
        currency: { type: string }
        totalBalance: { type: number, description: Net of asset balances (settlement position) }
        accounts:
          type: array
          items: { $ref: "#/components/schemas/LedgerAccount" }
        reconciliation: { $ref: "#/components/schemas/LedgerReconciliation" }
        transactions:
          type: array
          description: Most recent journal entries, newest first.
          items: { $ref: "#/components/schemas/LedgerTransaction" }
        revenue: { $ref: "#/components/schemas/LedgerRevenue" }
    TelemetryReport:
      type: object
      required: [requestsPerMin, p95LatencyMs, errorRatePercent, availabilityPercent, series, topErrors, dataSource]
      properties:
        requestsPerMin: { type: number }
        p95LatencyMs: { type: number }
        errorRatePercent: { type: number }
        availabilityPercent: { type: number }
        series:
          type: array
          items: { $ref: "#/components/schemas/MetricSeries" }
        topErrors:
          type: array
          items: { $ref: "#/components/schemas/TopError" }
        dataSource: { type: string, enum: [live, mock], description: "Indicates whether telemetry comes from live Azure Monitor / Application Insights or built-in mock values." }
    TopError:
      type: object
      required: [message, count, lastSeen]
      properties:
        message: { type: string }
        count: { type: integer }
        lastSeen: { type: string, format: date-time }
    Alert:
      type: object
      required: [id, appId, appName, title, severity, source, firedAt, status]
      properties:
        id: { type: string }
        appId: { type: string }
        appName: { type: string }
        title: { type: string }
        description: { type: string }
        severity: { $ref: "#/components/schemas/Severity" }
        source: { type: string, enum: [AzureMonitor, LogAnalytics, NetworkWatcher, CostManagement, ApplicationInsights, WebAppTelemetry] }
        firedAt: { type: string, format: date-time }
        status: { type: string, enum: [active, acknowledged, resolved] }
    GlobalHealth:
      type: object
      required: [totalApps, healthy, degraded, unhealthy, activeAlerts, monthToDateCost, currency]
      properties:
        totalApps: { type: integer }
        healthy: { type: integer }
        degraded: { type: integer }
        unhealthy: { type: integer }
        activeAlerts: { type: integer }
        monthToDateCost: { type: number }
        currency: { type: string }
    GlobalCostSummary:
      type: object
      required: [currency, monthToDate, forecast, budget, apiCalls, apiCost, daily, byApp, byResource, apiByApp, apiByName, revenue, revenueByApp, dataSource]
      properties:
        currency: { type: string }
        monthToDate: { type: number }
        forecast: { type: number }
        budget: { type: number }
        daily:
          type: array
          description: Day-by-day total spend across all apps for the last 30 days, with vs-last-week comparison.
          items: { $ref: "#/components/schemas/DailyCostPoint" }
        apiCalls: { type: integer, description: Total month-to-date API calls across all apps }
        apiCost: { type: number, description: Portion of monthToDate attributable to API usage }
        dataSource: { type: string, enum: [live, mock], description: "Indicates whether cost figures come from live Azure Cost Management or built-in mock values." }
        dataAsOf: { type: string, format: date-time, description: "Timestamp of when cost data was last fetched from Azure. Only present when dataSource is live." }
        budgetDataSource: { type: string, enum: [live, cached, estimated], description: "Indicates the origin of the budget and forecast figures: live = from Azure Budgets API, cached = last-known value from DB snapshot, estimated = formula fallback." }
        byApp:
          type: array
          items:
            type: object
            required: [appId, appName, amount]
            properties:
              appId: { type: string }
              appName: { type: string }
              amount: { type: number }
        byResource:
          description: Cost breakdown by Azure resource type, aggregated across all apps.
          type: array
          items: { $ref: "#/components/schemas/CostByService" }
        apiByApp:
          description: Per-app API usage with call counts and cost.
          type: array
          items:
            type: object
            required: [appId, appName, totalCalls, costPerMillion, cost]
            properties:
              appId: { type: string }
              appName: { type: string }
              totalCalls: { type: integer }
              costPerMillion: { type: number }
              cost: { type: number }
        apiByName:
          description: Flat breakdown of cost by API name per app, sorted by cost desc.
          type: array
          items:
            type: object
            required: [appId, appName, apiName, totalCalls, cost]
            properties:
              appId: { type: string }
              appName: { type: string }
              apiName: { type: string }
              totalCalls: { type: integer }
              cost: { type: number }
        revenue: { $ref: "#/components/schemas/Revenue" }
        revenueByApp:
          description: Per-app revenue with cost and margin for cost-vs-revenue comparison.
          type: array
          items:
            type: object
            required: [appId, appName, total, stripe, appStore, playStore, cost, net]
            properties:
              appId: { type: string }
              appName: { type: string }
              total: { type: number, description: Total month-to-date revenue across all sources }
              stripe: { type: number }
              appStore: { type: number }
              playStore: { type: number }
              cost: { type: number, description: Month-to-date Azure cost for the app (infra + API) }
              net: { type: number, description: total - cost }
              marginPercent:
                type: number
                nullable: true
                description: (net / total) * 100. Null when revenue is zero.
    Deployment:
      type: object
      required: [id, appId, appName, environment, version, status, triggeredBy, startedAt, commitSha, pipeline]
      properties:
        id: { type: string }
        appId: { type: string }
        appName: { type: string }
        environment: { type: string }
        version: { type: string }
        status: { type: string, enum: [Succeeded, Failed, InProgress, RolledBack] }
        triggeredBy: { type: string }
        startedAt: { type: string, format: date-time }
        durationSec: { type: integer, nullable: true }
        commitSha: { type: string }
        pipeline: { type: string }
    ActivityEntry:
      type: object
      required: [id, timestamp, actor, action, target, status, category]
      properties:
        id: { type: string }
        timestamp: { type: string, format: date-time }
        actor: { type: string }
        action: { type: string }
        target: { type: string }
        appId: { type: string }
        status: { type: string, enum: [Succeeded, Failed, Started] }
        category: { type: string }
    LogLine:
      type: object
      required: [id, timestamp, appId, level, message]
      properties:
        id: { type: string }
        timestamp: { type: string, format: date-time }
        appId: { type: string }
        level: { type: string, enum: [INFO, WARN, ERROR] }
        message: { type: string }
    ServiceHealthEvent:
      type: object
      required: [id, service, region, status, severity, title, startedAt]
      properties:
        id: { type: string }
        service: { type: string }
        region: { type: string }
        status: { type: string, enum: [Active, Resolved, Advisory] }
        severity: { type: string, enum: [Low, Medium, High] }
        title: { type: string }
        startedAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }
    SloRow:
      type: object
      required: [appId, appName, environment, uptimePct, errorBudgetRemainingPct, p95LatencyMs, p95TargetMs, errorRatePct, errorTargetPct]
      properties:
        appId: { type: string }
        appName: { type: string }
        environment: { type: string }
        uptimePct: { type: number }
        errorBudgetRemainingPct: { type: number }
        p95LatencyMs: { type: number }
        p95TargetMs: { type: number }
        errorRatePct: { type: number }
        errorTargetPct: { type: number }
    GlobalEndpointRow:
      type: object
      required: [id, appId, appName, name, region, status, latencyMs, packetLossPercent]
      properties:
        id: { type: string }
        appId: { type: string }
        appName: { type: string }
        name: { type: string }
        region: { type: string }
        status: { $ref: "#/components/schemas/Status" }
        latencyMs: { type: number }
        packetLossPercent: { type: number }
