<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbitGradient" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <filter id="orbitGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="90" cy="90" r="80" fill="url(#orbitGradient)" filter="url(#orbitGlow)" />
  <ellipse cx="90" cy="90" rx="64" ry="28" stroke="white" stroke-width="12" stroke-opacity="0.9" fill="none" />
  <ellipse cx="90" cy="90" rx="64" ry="28" stroke="white" stroke-width="12" stroke-opacity="0.9" fill="none" transform="rotate(60 90 90)" />
  <ellipse cx="90" cy="90" rx="64" ry="28" stroke="white" stroke-width="12" stroke-opacity="0.9" fill="none" transform="rotate(120 90 90)" />
  <circle cx="90" cy="90" r="16" fill="white" />
</svg>
