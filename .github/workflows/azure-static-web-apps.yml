name: SWA Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: OrbitProduction
    env:
      PORT: "3000"
      BASE_PATH: "/"
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @workspace/orbit run build

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: swa
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            token=$(az staticwebapp secrets list \
              --name swa-orbit-prod \
              --resource-group rg-orbit-prod-eus2 \
              --query "properties.apiKey" -o tsv)
            echo "::add-mask::$token"
            echo "token=$token" >> $GITHUB_OUTPUT

      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli

      - name: Deploy via SWA CLI
        run: |
          swa deploy artifacts/orbit/dist/public \
            --deployment-token "${{ steps.swa.outputs.token }}" \
            --env production
