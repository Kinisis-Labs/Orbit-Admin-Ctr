name: SWA Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      recreate_swa:
        description: "Delete and recreate the SWA resource to reset content service registration"
        type: boolean
        default: false
      add_custom_domain:
        description: "Register orbit.kinisislabs.com as a custom domain on the SWA (run once; outputs TXT record for DNS validation)"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: OrbitProduction
    env:
      PORT: "3000"
      BASE_PATH: "/"
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @workspace/orbit run build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Recreate SWA (reset content service registration)
        if: ${{ inputs.recreate_swa == true }}
        run: |
          echo "=== Deleting old SWA ==="
          az staticwebapp delete \
            --name swa-orbit-prod \
            --resource-group rg-orbit-prod-eus2 \
            --yes

          echo "=== Creating new SWA (no GitHub source) ==="
          az staticwebapp create \
            --name swa-orbit-prod \
            --resource-group rg-orbit-prod-eus2 \
            --location "eastus2" \
            --sku Standard

          NEW_HOST=$(az staticwebapp show \
            --name swa-orbit-prod \
            --resource-group rg-orbit-prod-eus2 \
            --query "defaultHostname" -o tsv)
          echo "=== New hostname: $NEW_HOST ==="
          echo "ACTION REQUIRED: Update Front Door SWA origin to: $NEW_HOST"

      - name: Register custom domain orbit.kinisislabs.com
        if: ${{ inputs.add_custom_domain == true }}
        run: |
          echo "=== Registering custom domain ==="
          az staticwebapp hostname set \
            --name swa-orbit-prod \
            --resource-group rg-orbit-prod-eus2 \
            --hostname orbit.kinisislabs.com \
            --validation-method dns-txt-token || true

          echo ""
          echo "=== Validation token ==="
          az staticwebapp hostname show \
            --name swa-orbit-prod \
            --resource-group rg-orbit-prod-eus2 \
            --hostname orbit.kinisislabs.com \
            -o json

          echo ""
          echo "ACTION REQUIRED: In your DNS provider, add a TXT record:"
          echo "  Name:  _dnsauth.orbit.kinisislabs.com"
          echo "  Value: (see validationToken in the JSON above)"
          echo ""
          echo "Once the TXT record propagates, Azure will auto-validate and the domain will become active."

      - name: Print current SWA hostname
        run: |
          SWA_HOST=$(az staticwebapp show \
            --name swa-orbit-prod \
            --resource-group rg-orbit-prod-eus2 \
            --query "defaultHostname" -o tsv)
          echo "SWA default hostname: $SWA_HOST"
          echo "Front Door SWA origin should be set to: $SWA_HOST"

      - name: Get SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name swa-orbit-prod \
            --resource-group rg-orbit-prod-eus2 \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Install SWA CLI and deploy
        run: |
          npm install -g @azure/static-web-apps-cli
          swa deploy artifacts/orbit/dist/public \
            --deployment-token "${{ steps.swa-token.outputs.token }}" \
            --env production \
            --no-use-keychain \
            --verbose
