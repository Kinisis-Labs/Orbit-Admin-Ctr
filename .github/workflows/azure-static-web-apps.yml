name: SWA Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      recreate_swa:
        description: "Delete and recreate the SWA resource to reset content service registration"
        type: boolean
        default: false
      add_custom_domain:
        description: "Register orbit.kinisislabs.com as a custom domain on the SWA (run once; outputs TXT record for DNS validation)"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: swa-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: OrbitProduction
    env:
      PORT: "3000"
      BASE_PATH: "/"
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @workspace/orbit-app run build
        env:
          VITE_APPINSIGHTS_CONNECTION_STRING: ${{ secrets.VITE_APPINSIGHTS_CONNECTION_STRING }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Recreate SWA (reset content service registration)
        if: ${{ inputs.recreate_swa == true }}
        run: |
          echo "=== Deleting old SWA ==="
          az staticwebapp delete \
            --name swa-orbit-prod \
            --resource-group rg-orbit-prod-eus2 \
            --yes

          echo "=== Creating new SWA (no GitHub source) ==="
          az staticwebapp create \
            --name swa-orbit-prod \
            --resource-group rg-orbit-prod-eus2 \
            --location "eastus2" \
            --sku Standard

          NEW_HOST=$(az staticwebapp show \
            --name swa-orbit-prod \
            --resource-group rg-orbit-prod-eus2 \
            --query "defaultHostname" -o tsv)
          echo "=== New hostname: $NEW_HOST ==="
          echo "ACTION REQUIRED: Update Front Door SWA origin to: $NEW_HOST"

      - name: Register custom domain orbit.kinisislabs.com
        if: ${{ inputs.add_custom_domain == true }}
        run: |
          echo "=== Registering custom domain ==="
          az staticwebapp hostname set \
            --name swa-orbit-prod \
            --resource-group rg-orbit-prod-eus2 \
            --hostname orbit.kinisislabs.com \
            --validation-method dns-txt-token || true

          echo ""
          echo "=== Validation token ==="
          az staticwebapp hostname show \
            --name swa-orbit-prod \
            --resource-group rg-orbit-prod-eus2 \
            --hostname orbit.kinisislabs.com \
            -o json

          echo ""
          echo "ACTION REQUIRED: In your DNS provider, add a TXT record:"
          echo "  Name:  _dnsauth.orbit.kinisislabs.com"
          echo "  Value: (see validationToken in the JSON above)"
          echo ""
          echo "Once the TXT record propagates, Azure will auto-validate and the domain will become active."

      - name: Print current SWA hostname and update Front Door origin
        continue-on-error: true
        run: |
          SWA_HOST=$(az staticwebapp show \
            --name swa-orbit-prod \
            --resource-group rg-orbit-prod-eus2 \
            --query "defaultHostname" -o tsv)
          echo "SWA default hostname: $SWA_HOST"
          echo "Front Door SWA origin should be set to: $SWA_HOST"

          # Auto-update Front Door SWA origin if the hostname has changed.
          # Requires Contributor (or CDN Profile Contributor) on the shared
          # platform resource group. Runs best-effort — failure does NOT
          # block the asset deploy below.
          AFD_RG=$(az group list --query "[?contains(name,'platform-shared')].name | [0]" -o tsv 2>/dev/null || true)
          if [ -z "$AFD_RG" ]; then
            echo "Shared platform resource group not found — skipping Front Door update."
            exit 0
          fi
          echo "Found Front Door resource group: $AFD_RG"
          ORIGIN_ID=$(az afd origin list \
            --profile-name afd-shared-prod \
            --resource-group "$AFD_RG" \
            --origin-group-name default-origin-group \
            --query "[?contains(hostName,'azurestaticapps.net')].name | [0]" \
            -o tsv 2>/dev/null || true)
          if [ -z "$ORIGIN_ID" ]; then
            echo "SWA origin not found in Front Door — skipping update."
            exit 0
          fi
          CURRENT=$(az afd origin show \
            --profile-name afd-shared-prod \
            --resource-group "$AFD_RG" \
            --origin-group-name default-origin-group \
            --origin-name "$ORIGIN_ID" \
            --query "hostName" -o tsv 2>/dev/null || true)
          if [ "$CURRENT" = "$SWA_HOST" ]; then
            echo "Front Door origin already up to date: $SWA_HOST"
            exit 0
          fi
          echo "Updating Front Door origin from $CURRENT to $SWA_HOST..."
          az afd origin update \
            --profile-name afd-shared-prod \
            --resource-group "$AFD_RG" \
            --origin-group-name default-origin-group \
            --origin-name "$ORIGIN_ID" \
            --host-name "$SWA_HOST" \
            --origin-host-header "$SWA_HOST" || echo "Front Door update failed (permissions?) — update manually."

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: apps/orbit/dist/public
          skip_app_build: true
          skip_api_build: true
          output_location: ""
