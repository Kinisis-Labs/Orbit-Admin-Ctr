name: API Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: OrbitProduction
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/orbit-api" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/api-server/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image and env vars
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ca-orbit-api-prod \
              --resource-group rg-orbit-prod-eus2 \
              --image "${{ steps.image.outputs.name }}:${{ github.sha }}" \
              --set-env-vars \
                NODE_ENV=production \
                PORT=80 \
                DATABASE_SSL=true \
                SESSION_COOKIE_DOMAIN=.kinisislabs.com \
                ENTRA_TENANT_ID="${{ secrets.ENTRA_TENANT_ID }}" \
                ENTRA_CLIENT_ID="${{ secrets.ENTRA_CLIENT_ID }}" \
                ENTRA_CLIENT_SECRET="${{ secrets.ENTRA_CLIENT_SECRET }}" \
                ENTRA_REDIRECT_URI=https://orbit.kinisislabs.com/api/auth/callback \
                ENTRA_AUTHORIZED_GROUP_ID="${{ secrets.ENTRA_AUTHORIZED_GROUP_ID }}" \
                ENTRA_COST_READER_GROUP_ID="${{ secrets.ENTRA_COST_READER_GROUP_ID }}"
            az containerapp ingress update \
              --name ca-orbit-api-prod \
              --resource-group rg-orbit-prod-eus2 \
              --target-port 80

      - name: Print Container App FQDN (for Front Door origin config)
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            FQDN=$(az containerapp show \
              --name ca-orbit-api-prod \
              --resource-group rg-orbit-prod-eus2 \
              --query "properties.configuration.ingress.fqdn" -o tsv)
            echo ""
            echo "============================================"
            echo "Container App FQDN: $FQDN"
            echo ""
            echo "Front Door API origin group setup:"
            echo "  Origin group name : api-origin-group (or similar)"
            echo "  Origin host name  : $FQDN"
            echo "  Origin host header: $FQDN"
            echo "  HTTPS port        : 443"
            echo "  Route pattern     : /api/*  →  api-origin-group"
            echo "============================================"
