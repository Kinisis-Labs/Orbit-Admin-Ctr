name: API Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    environment: OrbitProduction
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/orbit-api" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/api-server/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

  migrate:
    name: DB migrations (self-hosted / VNet)
    runs-on: self-hosted
    needs: build
    environment: OrbitProduction
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run DB migrations
        run: pnpm --filter @workspace/db run push-force
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run threshold history backfill
        run: pnpm --filter @workspace/scripts run backfill-threshold-history
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Deploy to Container App
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment: OrbitProduction
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Configure GHCR pull credentials
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp registry set \
              --name ca-orbit-prod-v2 \
              --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
              --server ghcr.io \
              --username "${{ github.repository_owner }}" \
              --password "${{ secrets.GHCR_PAT }}"

      - name: Roll Container App
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ca-orbit-prod-v2 \
              --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
              --image "${{ needs.build.outputs.image }}:${{ github.sha }}" \
              --min-replicas 1 \
              --set-env-vars \
                NODE_ENV=production \
                PORT=80 \
                DATABASE_SSL=true \
                SESSION_COOKIE_DOMAIN=.kinisislabs.com \
                DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
                ENTRA_TENANT_ID="${{ secrets.ENTRA_TENANT_ID }}" \
                ENTRA_CLIENT_ID="${{ secrets.ENTRA_CLIENT_ID }}" \
                ENTRA_CLIENT_SECRET="${{ secrets.ENTRA_CLIENT_SECRET }}" \
                ENTRA_REDIRECT_URI=https://orbit.kinisislabs.com/api/auth/callback \
                ENTRA_AUTHORIZED_GROUP_ID="${{ secrets.ENTRA_AUTHORIZED_GROUP_ID }}" \
                ENTRA_COST_READER_GROUP_ID="${{ secrets.ENTRA_COST_READER_GROUP_ID }}" \
                ENTRA_ADMIN_GROUP_ID="${{ secrets.ENTRA_ADMIN_GROUP_ID }}" \
                ENTRA_ENGINEER_GROUP_ID="${{ secrets.ENTRA_ENGINEER_GROUP_ID }}" \
                ENTRA_FINOPS_GROUP_ID="${{ secrets.ENTRA_FINOPS_GROUP_ID }}" \
                AZURE_SUBSCRIPTION_IDS="${{ secrets.AZURE_SUBSCRIPTION_IDS }}" \
                AZURE_CLIENT_ID="${{ secrets.AZURE_MANAGED_IDENTITY_CLIENT_ID }}" \
                AZURE_TENANT_ID="${{ secrets.ENTRA_TENANT_ID }}" \
                AZURE_SUB_GRAILBABE="${{ secrets.AZURE_SUB_GRAILBABE }}" \
                AZURE_SUB_ORBIT="${{ secrets.AZURE_SUB_ORBIT }}" \
                AZURE_SUB_KINISIS_LABS="${{ secrets.AZURE_SUB_KINISIS_LABS }}" \
                AZURE_LOG_ANALYTICS_WORKSPACE_ID="${{ secrets.AZURE_LOG_ANALYTICS_WORKSPACE_ID }}" \
                GITHUB_TOKEN="${{ secrets.ORBIT_DEPLOY_ID }}" \
                STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}"
            az containerapp ingress update \
              --name ca-orbit-prod-v2 \
              --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
              --target-port 80

      - name: Wait for revision to be Running
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            REVISION=$(az containerapp show \
              --name ca-orbit-prod-v2 \
              --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
              --query "properties.latestRevisionName" -o tsv)
            echo "Polling revision: $REVISION"

            for i in $(seq 1 24); do
              STATE=$(az containerapp revision show \
                --name ca-orbit-prod-v2 \
                --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
                --revision "$REVISION" \
                --query "properties.runningState" -o tsv)
              echo "Attempt $i/24 — runningState: $STATE"
              if [ "$STATE" = "Running" ]; then
                echo "Revision $REVISION is Running ✓"
                exit 0
              fi
              if [ "$STATE" = "Failed" ] || [ "$STATE" = "Stopped" ] || [ "$STATE" = "ActivationFailed" ]; then
                echo "Revision $REVISION entered terminal state: $STATE"
                echo "Check revision logs in the Azure portal for ImagePullBackOff or startup errors."
                exit 1
              fi
              sleep 10
            done

            echo "Timed out after ~4 minutes waiting for revision $REVISION to reach Running state."
            exit 1

      - name: Smoke-test /api/healthz
        run: |
          echo "Sending smoke-test request to https://orbit.kinisislabs.com/api/healthz"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://orbit.kinisislabs.com/api/healthz)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "Smoke test passed ✓"
          else
            echo "Smoke test FAILED — /api/healthz returned HTTP $STATUS"
            exit 1
          fi

      - name: Notify Teams on deploy outcome
        if: always()
        env:
          DEPLOY_TEAMS_WEBHOOK_URL: ${{ secrets.DEPLOY_TEAMS_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DEPLOY_TEAMS_WEBHOOK_URL" ]; then
            echo "DEPLOY_TEAMS_WEBHOOK_URL not set — skipping Teams notification."
            exit 0
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            COLOR="Good"
            ICON="✅"
            LABEL="Succeeded"
          else
            COLOR="Attention"
            ICON="❌"
            LABEL="Failed"
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"

          PAYLOAD=$(cat <<EOF
          {
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "\$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.4",
                  "body": [
                    {
                      "type": "TextBlock",
                      "text": "${ICON} Orbit API deploy ${LABEL}",
                      "weight": "Bolder",
                      "size": "Medium",
                      "color": "${COLOR}"
                    },
                    {
                      "type": "FactSet",
                      "facts": [
                        { "title": "Status",  "value": "${LABEL}" },
                        { "title": "Commit",  "value": "${SHORT_SHA}" },
                        { "title": "Actor",   "value": "${ACTOR}" }
                      ]
                    },
                    {
                      "type": "ActionSet",
                      "actions": [
                        {
                          "type": "Action.OpenUrl",
                          "title": "View run",
                          "url": "${RUN_URL}"
                        }
                      ]
                    }
                  ]
                }
              }
            ]
          }
          EOF
          )

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$DEPLOY_TEAMS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Teams webhook responded with HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "202" ]; then
            echo "Warning: unexpected HTTP status from Teams webhook."
          fi
