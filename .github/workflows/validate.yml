name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-apps:
    name: Validate APPS inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared libs
        run: pnpm run typecheck:libs

      - name: Validate APPS inventory against OpenAPI schema
        run: pnpm --filter @workspace/api-server run validate-apps
        env:
          DATABASE_URL: postgresql://localhost/placeholder
