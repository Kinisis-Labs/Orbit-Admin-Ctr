name: Typecheck

on:
  push:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/tsconfig*.json"
      - "**/package.json"
  pull_request:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/tsconfig*.json"
      - "**/package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck
