name: Deploy API

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_migrate:
        description: "Skip DB migration step (use when no schema changes — no self-hosted runner required)"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  packages: write

concurrency:
  group: api-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    environment: OrbitProduction
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/orbit-api" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/api-server/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

  migrate:
    name: DB migrations (self-hosted / VNet)
    runs-on: self-hosted
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_migrate != true }}
    environment: OrbitProduction
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: CI=true pnpm install --frozen-lockfile

      - name: Run DB migrations
        run: pnpm --filter @workspace/db run push-force
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run threshold history backfill
        run: pnpm --filter @workspace/scripts run backfill-threshold-history
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Deploy to Container App
    runs-on: ubuntu-latest
    needs: [build, migrate]
    if: always() && needs.build.result == 'success' && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    environment: OrbitProduction
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Wait for Container App to be idle
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            echo "Waiting for any in-progress Container App operation to clear..."
            for i in $(seq 1 18); do
              PROV=$(az containerapp show \
                --name ca-orbit-prod-v2 \
                --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
                --query "properties.provisioningState" -o tsv 2>/dev/null || echo "Unknown")
              echo "Attempt $i/18 — provisioningState: $PROV"
              if [ "$PROV" = "Succeeded" ] || [ "$PROV" = "Failed" ] || [ "$PROV" = "Canceled" ]; then
                echo "Container App is idle (state: $PROV) ✓"
                exit 0
              fi
              sleep 10
            done
            echo "Warning: timed out waiting for idle state — proceeding anyway"

      - name: Remove GHCR pull credentials (package is public)
        continue-on-error: true
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            # The orbit-api GHCR package is public — anonymous pulls work.
            # Removing any stored credential prevents a stale PAT from
            # blocking image pulls on new revisions.
            REGISTRIES=$(az containerapp registry list \
              --name ca-orbit-prod-v2 \
              --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
              --query "[?server=='ghcr.io'].server" -o tsv 2>/dev/null || echo "")
            if [ -n "$REGISTRIES" ]; then
              echo "Removing stored ghcr.io registry credential..."
              az containerapp registry remove \
                --name ca-orbit-prod-v2 \
                --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
                --server ghcr.io
              echo "Removed ✓"
            else
              echo "No ghcr.io registry credential configured — nothing to remove ✓"
            fi

      - name: Wait for registry update to settle
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            # Give Azure 20s to transition from the previous Succeeded state into
            # InProgress for the registry-set operation before we start polling.
            # Without this delay the poll immediately sees the old Succeeded state
            # and exits, then az containerapp update hits ContainerAppOperationInProgress.
            echo "Sleeping 20s to let Azure register the registry-set operation..."
            sleep 20
            echo "Waiting for registry-set operation to complete before rolling image..."
            for i in $(seq 1 24); do
              PROV=$(az containerapp show \
                --name ca-orbit-prod-v2 \
                --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
                --query "properties.provisioningState" -o tsv 2>/dev/null || echo "Unknown")
              echo "Attempt $i/18 — provisioningState: $PROV"
              if [ "$PROV" = "Succeeded" ] || [ "$PROV" = "Failed" ] || [ "$PROV" = "Canceled" ]; then
                echo "Container App is idle (state: $PROV) ✓"
                exit 0
              fi
              sleep 10
            done
            echo "Warning: timed out waiting for registry update to settle — proceeding anyway"

      - name: Roll Container App
        # Strategy: GET current env vars from CA → merge → pass ALL vars to
        # az containerapp update --set-env-vars.  This preserves Portal-set vars
        # (e.g. Apple credentials) because we read them first and include them in
        # the merged set.  Empty GitHub secrets are skipped so they never overwrite
        # a Portal value.  Using az containerapp update (not az rest PUT) avoids
        # ARM API version incompatibilities with newer CA spec properties.
        uses: azure/cli@v2
        env:
          V_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          V_SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          V_ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
          V_ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          V_ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
          V_ENTRA_AUTHORIZED_GROUP_ID: ${{ secrets.ENTRA_AUTHORIZED_GROUP_ID }}
          V_ENTRA_COST_READER_GROUP_ID: ${{ secrets.ENTRA_COST_READER_GROUP_ID }}
          V_ENTRA_ADMIN_GROUP_ID: ${{ secrets.ENTRA_ADMIN_GROUP_ID }}
          V_ENTRA_ENGINEER_GROUP_ID: ${{ secrets.ENTRA_ENGINEER_GROUP_ID }}
          V_ENTRA_FINOPS_GROUP_ID: ${{ secrets.ENTRA_FINOPS_GROUP_ID }}
          V_AZURE_MANAGED_IDENTITY_CLIENT_ID: ${{ secrets.AZURE_MANAGED_IDENTITY_CLIENT_ID }}
          V_AZURE_SUB_GRAILBABE: ${{ secrets.AZURE_SUB_GRAILBABE }}
          V_AZURE_SUB_ORBIT: ${{ secrets.AZURE_SUB_ORBIT }}
          V_AZURE_SUB_KINISIS_LABS: ${{ secrets.AZURE_SUB_KINISIS_LABS }}
          V_AZURE_SUB_SHAREDPLATFORM: ${{ secrets.AZURE_SUB_SHAREDPLATFORM }}
          V_AZURE_LOG_ANALYTICS_WORKSPACE_ID: ${{ secrets.AZURE_LOG_ANALYTICS_WORKSPACE_ID }}
          V_AZURE_BILLING_ACCOUNT_ID: ${{ secrets.AZURE_BILLING_ACCOUNT_ID }}
          V_BUDGET_AMOUNT__GRAILBABE: ${{ secrets.BUDGET_AMOUNT__GRAILBABE }}
          V_BUDGET_AMOUNT__KINISIS_LABS: ${{ secrets.BUDGET_AMOUNT__KINISIS_LABS }}
          V_CLERK_SECRET_KEY__GRAILBABE: ${{ secrets.CLERK_SECRET_KEY__GRAILBABE }}
          V_ORBIT_DEPLOYMENT_ID: ${{ secrets.ORBIT_DEPLOYMENT_ID }}
          V_STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          V_APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
          V_APP_CONFIGURATION_ENDPOINT: ${{ secrets.APP_CONFIGURATION_ENDPOINT }}
          NEW_IMAGE: "${{ needs.build.outputs.image }}:${{ github.sha }}"
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail

            # ── 1. Read current env vars from Container App ───────────────
            az containerapp show \
              --name ca-orbit-prod-v2 \
              --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
              --query "properties.template.containers[0].env" \
              -o json > /tmp/ca_env_current.json

            # ── 2. Merge env vars in Python ───────────────────────────────
            python3 - << 'PYEOF'
            import json, os
            existing = {}
            for item in json.load(open("/tmp/ca_env_current.json")) or []:
                if item.get("value") is not None:
                    existing[item["name"]] = item["value"]
            fixed = {
                "NODE_ENV": "production",
                "PORT": "80",
                "DATABASE_SSL": "true",
                "SESSION_COOKIE_DOMAIN": ".kinisislabs.com",
                "ENTRA_REDIRECT_URI": "https://orbit.kinisislabs.com/api/auth/callback",
                "ENTRA_POST_LOGOUT_REDIRECT_URI": "https://orbit.kinisislabs.com/signed-out",
            }
            secret_map = [
                ("DATABASE_URL",                         "V_DATABASE_URL"),
                ("SESSION_SECRET",                       "V_SESSION_SECRET"),
                ("ENTRA_TENANT_ID",                      "V_ENTRA_TENANT_ID"),
                ("ENTRA_CLIENT_ID",                      "V_ENTRA_CLIENT_ID"),
                ("ENTRA_CLIENT_SECRET",                  "V_ENTRA_CLIENT_SECRET"),
                ("ENTRA_AUTHORIZED_GROUP_ID",            "V_ENTRA_AUTHORIZED_GROUP_ID"),
                ("ENTRA_COST_READER_GROUP_ID",           "V_ENTRA_COST_READER_GROUP_ID"),
                ("ENTRA_ADMIN_GROUP_ID",                 "V_ENTRA_ADMIN_GROUP_ID"),
                ("ENTRA_ENGINEER_GROUP_ID",              "V_ENTRA_ENGINEER_GROUP_ID"),
                ("ENTRA_FINOPS_GROUP_ID",                "V_ENTRA_FINOPS_GROUP_ID"),
                ("AZURE_CLIENT_ID",                      "V_AZURE_MANAGED_IDENTITY_CLIENT_ID"),
                ("AZURE_MANAGED_IDENTITY_CLIENT_ID",     "V_AZURE_MANAGED_IDENTITY_CLIENT_ID"),
                ("AZURE_TENANT_ID",                      "V_ENTRA_TENANT_ID"),
                ("AZURE_SUB_GRAILBABE",                  "V_AZURE_SUB_GRAILBABE"),
                ("AZURE_SUB_ORBIT",                      "V_AZURE_SUB_ORBIT"),
                ("AZURE_SUB_KINISIS_LABS",               "V_AZURE_SUB_KINISIS_LABS"),
                ("AZURE_SUB_SHAREDPLATFORM",             "V_AZURE_SUB_SHAREDPLATFORM"),
                ("AZURE_LOG_ANALYTICS_WORKSPACE_ID",     "V_AZURE_LOG_ANALYTICS_WORKSPACE_ID"),
                ("AZURE_BILLING_ACCOUNT_ID",             "V_AZURE_BILLING_ACCOUNT_ID"),
                ("BUDGET_AMOUNT__GRAILBABE",             "V_BUDGET_AMOUNT__GRAILBABE"),
                ("BUDGET_AMOUNT__KINISIS_LABS",          "V_BUDGET_AMOUNT__KINISIS_LABS"),
                ("CLERK_SECRET_KEY__GRAILBABE",          "V_CLERK_SECRET_KEY__GRAILBABE"),
                ("GITHUB_TOKEN",                         "V_ORBIT_DEPLOYMENT_ID"),
                ("STRIPE_SECRET_KEY",                    "V_STRIPE_SECRET_KEY"),
                ("APPLICATIONINSIGHTS_CONNECTION_STRING","V_APPLICATIONINSIGHTS_CONNECTION_STRING"),
                ("APP_CONFIGURATION_ENDPOINT",           "V_APP_CONFIGURATION_ENDPOINT"),
            ]
            from_secrets = {k: os.environ[env] for k, env in secret_map if os.environ.get(env)}
            sub_g = from_secrets.get("AZURE_SUB_GRAILBABE",      existing.get("AZURE_SUB_GRAILBABE", ""))
            sub_s = from_secrets.get("AZURE_SUB_SHAREDPLATFORM",  existing.get("AZURE_SUB_SHAREDPLATFORM", ""))
            subs  = [s for s in [sub_g, sub_s] if s]
            if subs:
                fixed["AZURE_SUBSCRIPTION_IDS"] = ",".join(subs)
            merged = {**existing, **fixed, **from_secrets}
            with open("/tmp/ca_env_merged.txt", "w") as f:
                for k, v in merged.items():
                    f.write(f"{k}={v}\n")
            n_portal_only = len(set(existing) - set(fixed) - set(from_secrets))
            print(f"Env vars: {len(merged)} total  ({n_portal_only} Portal-only preserved, {len(from_secrets)} from secrets, {len(fixed)} fixed)")
            PYEOF

            # ── 3. Build --set-env-vars args and update image + env vars ──
            # Read merged vars from file; quote each value to handle spaces/special chars.
            # az containerapp update --set-env-vars replaces ALL env vars — that is
            # intentional here because we pass the complete merged set.
            ENV_ARGS=()
            while IFS= read -r line || [[ -n "$line" ]]; do
              KEY="${line%%=*}"
              VAL="${line#*=}"
              ENV_ARGS+=("${KEY}=${VAL}")
            done < /tmp/ca_env_merged.txt

            echo "Updating image and ${#ENV_ARGS[@]} env vars..."
            az containerapp update \
              --name ca-orbit-prod-v2 \
              --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
              --image "$NEW_IMAGE" \
              --set-env-vars "${ENV_ARGS[@]}" \
              --output none
            echo "Container App updated ✓"

      - name: Wait for revision to be Running
        id: wait_revision
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            REVISION=$(az containerapp show \
              --name ca-orbit-prod-v2 \
              --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
              --query "properties.latestRevisionName" -o tsv)
            echo "Polling revision: $REVISION"
            echo "revision=$REVISION" >> "$GITHUB_OUTPUT"

            for i in $(seq 1 54); do
              STATE=$(az containerapp revision show \
                --name ca-orbit-prod-v2 \
                --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
                --revision "$REVISION" \
                --query "properties.runningState" -o tsv)
              echo "Attempt $i/54 — runningState: $STATE"
              if [ "$STATE" = "Running" ]; then
                echo "Revision $REVISION is Running ✓"
                exit 0
              fi
              if [ "$STATE" = "Failed" ] || [ "$STATE" = "Stopped" ] || [ "$STATE" = "ActivationFailed" ]; then
                echo "Revision $REVISION entered terminal state: $STATE"
                exit 1
              fi
              sleep 10
            done

            echo "Timed out after ~9 minutes waiting for revision $REVISION."
            exit 1

      - name: Dump CA container logs on failure
        if: failure() && steps.wait_revision.outputs.revision != ''
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            REVISION="${{ steps.wait_revision.outputs.revision }}"
            echo "========== Container App revision detail =========="
            az containerapp revision show \
              --name ca-orbit-prod-v2 \
              --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
              --revision "$REVISION" \
              --output json | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            p = d.get('properties', {})
            print('runningState:', p.get('runningState'))
            print('provisioningState:', p.get('provisioningState'))
            print('healthState:', p.get('healthState'))
            print('replicas:', json.dumps(p.get('replicas', []), indent=2))
            "
            echo ""
            echo "========== Registry credentials on CA =========="
            az containerapp registry list \
              --name ca-orbit-prod-v2 \
              --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
              --output json || echo "(registry list unavailable)"
            echo ""
            echo "========== Container App startup/system probes =========="
            az containerapp show \
              --name ca-orbit-prod-v2 \
              --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
              --query "properties.template.containers[0].probes" \
              --output json || echo "(no probes configured)"
            echo ""
            echo "========== Container logs (last 120 lines) =========="
            az containerapp logs show \
              --name ca-orbit-prod-v2 \
              --resource-group rg-kinisislabs-platform-shared-prod-eus2 \
              --revision "$REVISION" \
              --tail 120 \
              --format text \
              2>&1 || echo "(log stream unavailable — check Azure portal → Monitoring → Log stream)"

      - name: Smoke-test /api/healthz
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://orbit.kinisislabs.com/api/healthz)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "Smoke test passed ✓"
          else
            echo "Smoke test FAILED — /api/healthz returned HTTP $STATUS"
            exit 1
          fi

      - name: Notify Teams on deploy outcome
        if: always()
        env:
          DEPLOY_TEAMS_WEBHOOK_URL: ${{ secrets.DEPLOY_TEAMS_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DEPLOY_TEAMS_WEBHOOK_URL" ]; then
            echo "DEPLOY_TEAMS_WEBHOOK_URL not set — skipping Teams notification."
            exit 0
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            COLOR="Good"; ICON="✅"; LABEL="Succeeded"
          else
            COLOR="Attention"; ICON="❌"; LABEL="Failed"
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"

          PAYLOAD=$(cat <<EOF
          {
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "\$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  { "type": "TextBlock", "text": "${ICON} Orbit API deploy ${LABEL}", "weight": "Bolder", "size": "Medium", "color": "${COLOR}" },
                  { "type": "FactSet", "facts": [
                    { "title": "Status", "value": "${LABEL}" },
                    { "title": "Commit", "value": "${SHORT_SHA}" },
                    { "title": "Actor",  "value": "${ACTOR}" }
                  ]},
                  { "type": "ActionSet", "actions": [{ "type": "Action.OpenUrl", "title": "View run", "url": "${RUN_URL}" }] }
                ]
              }
            }]
          }
          EOF
          )

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$DEPLOY_TEAMS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "Teams webhook HTTP $HTTP_STATUS"
